<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Profile - Food Myth Buster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--primary:#7c6bff;--text:#e8e6f0;--text-muted:#8886a8;--border:#2a2650;--surface:#0d0b1e;--card:#161330;--true:#10d988;--false:#ff5c6b;--partial:#ffb347;}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--surface);line-height:1.6;}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:#3a3560;border-radius:3px}
.container{max-width:1200px;margin:0 auto;padding:0 24px;}
header{background:rgba(13,11,30,0.97);backdrop-filter:blur(16px);padding:14px 0;position:sticky;top:0;z-index:200;border-bottom:1px solid var(--border);}
header .container{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.logo{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,#7c6bff,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
nav{display:flex;gap:4px;align-items:center;flex-wrap:wrap;}
nav a{color:var(--text-muted);text-decoration:none;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;transition:all 0.2s;}
nav a:hover{background:rgba(124,107,255,0.15);color:var(--text);}
.btn-login{background:linear-gradient(135deg,#7c6bff,#9b6bff);color:white;border:none;padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,107,255,0.4);}
.profile-hero{background:linear-gradient(135deg,#1a1530 0%,#0f0d20 100%);border-bottom:1px solid var(--border);padding:48px 24px 80px;position:relative;overflow:hidden;}
.profile-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(124,107,255,0.12),transparent 60%);}
.hero-content{position:relative;display:flex;align-items:center;gap:28px;flex-wrap:wrap;}
.avatar-wrap{position:relative;width:96px;height:96px;flex-shrink:0;}
.avatar-ring{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,#7c6bff,#9b59b6);border:3px solid rgba(124,107,255,0.4);display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:white;font-family:'Sora',sans-serif;overflow:hidden;}
.avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-edit-btn{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:#7c6bff;border:2px solid var(--surface);color:white;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.avatar-edit-btn:hover{background:#6254e8;transform:scale(1.1);}
#avatarInput{display:none;}
.hero-text h1{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;color:white;margin-bottom:4px;letter-spacing:-0.5px;}
.hero-text .email{color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:10px;}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap;}
.hero-badge{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:3px 12px;border-radius:20px;font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);}
.hero-badge.admin{background:rgba(255,215,0,0.15);border-color:rgba(255,215,0,0.3);color:#ffd700;}
.logout-btn{margin-left:auto;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.7);padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.logout-btn:hover{background:rgba(255,92,107,0.15);border-color:rgba(255,92,107,0.3);color:#ff5c6b;}
.stats-strip{background:#0f0d1e;border-bottom:1px solid var(--border);margin-top:-36px;position:relative;z-index:10;border-radius:20px 20px 0 0;}
.stats-strip .container{display:grid;grid-template-columns:repeat(4,1fr);}
.stat-item{padding:22px 20px;text-align:center;border-right:1px solid var(--border);}
.stat-item:last-child{border-right:none;}
.stat-num{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;color:#7c6bff;display:block;}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.profile-layout{display:grid;grid-template-columns:1fr 300px;gap:24px;padding:28px 0 60px;align-items:start;}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab-btn{padding:10px 20px;border:none;background:transparent;font-size:13px;font-weight:600;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:6px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:#7c6bff;border-bottom-color:#7c6bff;}
.tab-count{background:rgba(124,107,255,0.15);color:#7c6bff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.myth-bcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:12px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;animation:fadeIn 0.3s ease both;}
.myth-bcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.myth-bcard.v-TRUE::before{background:var(--true);}
.myth-bcard.v-FALSE::before{background:var(--false);}
.myth-bcard.v-PARTIAL::before{background:var(--partial);}
.myth-bcard:hover{border-color:#3a3560;background:#1a1730;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.myth-bcard-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px;}
.myth-bcard-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;flex:1;line-height:1.4;}
.myth-bcard-meta{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--text-muted);}
.remove-bm{background:none;border:none;font-size:15px;cursor:pointer;padding:2px 5px;border-radius:6px;color:var(--text-muted);transition:all 0.2s;opacity:0;}
.myth-bcard:hover .remove-bm{opacity:1;}
.remove-bm:hover{background:rgba(255,92,107,0.15);color:var(--false);}
.verdict-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-weight:700;font-size:10px;font-family:'Sora',sans-serif;}
.verdict-TRUE{background:rgba(16,217,136,0.12);color:#10d988;border:1px solid rgba(16,217,136,0.25);}
.verdict-FALSE{background:rgba(255,92,107,0.12);color:#ff5c6b;border:1px solid rgba(255,92,107,0.25);}
.verdict-PARTIAL{background:rgba(255,179,71,0.12);color:#ffb347;border:1px solid rgba(255,179,71,0.25);}
.sub-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:12px;animation:fadeIn 0.3s ease both;}
.status-pill{font-size:10px;padding:3px 10px;border-radius:999px;font-weight:700;white-space:nowrap;}
.status-PENDING{background:rgba(255,179,71,0.12);color:#ffb347;border:1px solid rgba(255,179,71,0.25);}
.status-APPROVED{background:rgba(16,217,136,0.12);color:#10d988;border:1px solid rgba(16,217,136,0.25);}
.status-REJECTED{background:rgba(255,92,107,0.12);color:#ff5c6b;border:1px solid rgba(255,92,107,0.25);}
.empty-state{text-align:center;padding:50px 20px;background:var(--card);border-radius:14px;border:1px dashed var(--border);}
.empty-state .emoji{font-size:44px;margin-bottom:10px;}
.empty-state h3{font-family:'Sora',sans-serif;font-size:16px;margin-bottom:6px;}
.empty-state p{color:var(--text-muted);font-size:13px;margin-bottom:16px;}
.empty-state a{display:inline-block;padding:9px 20px;background:#7c6bff;color:white;border-radius:9px;text-decoration:none;font-size:13px;font-weight:600;}
.sidebar-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.sidebar-card-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.account-row{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.account-row:last-child{border-bottom:none;padding-bottom:0;}
.account-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.account-value{font-size:13px;font-weight:500;color:var(--text);word-break:break-all;}
.edit-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:16px;}
.edit-section h3{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:16px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;background:#0d0b1e;border:1px solid var(--border);border-radius:9px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;transition:border-color 0.2s;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#7c6bff;}
.form-group textarea{resize:vertical;min-height:72px;}
.form-group select option{background:#1a1530;}
.save-btn{width:100%;padding:11px;border-radius:9px;border:none;background:linear-gradient(135deg,#7c6bff,#9b6bff);color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;margin-top:4px;}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,107,255,0.35);}
.save-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.alert{padding:10px 14px;border-radius:9px;font-size:13px;margin-bottom:12px;}
.alert-success{background:rgba(16,217,136,0.1);border:1px solid rgba(16,217,136,0.2);color:#10d988;}
.alert-error{background:rgba(255,92,107,0.1);border:1px solid rgba(255,92,107,0.2);color:#ff5c6b;}
.danger-zone{background:rgba(255,92,107,0.05);border:1px solid rgba(255,92,107,0.2);border-radius:14px;padding:18px;}
.danger-zone-title{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:#ff5c6b;margin-bottom:10px;}
.danger-btn{width:100%;padding:10px;border-radius:9px;border:1px solid rgba(255,92,107,0.3);background:transparent;color:#ff5c6b;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;margin-bottom:8px;}
.danger-btn:hover{background:rgba(255,92,107,0.1);}
.danger-btn:last-child{margin-bottom:0;}
.not-logged-in{text-align:center;padding:100px 20px;}
.not-logged-in h2{font-family:'Sora',sans-serif;font-size:24px;margin-bottom:10px;}
.not-logged-in p{color:var(--text-muted);margin-bottom:20px;}
.not-logged-in button{padding:12px 26px;background:#7c6bff;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;}
footer{background:#080714;border-top:1px solid var(--border);color:var(--text-muted);padding:24px 0;text-align:center;font-size:13px;}
footer p{margin:3px 0;}
.flag-row{display:flex;gap:8px;}
.flag-row input{width:80px;}
.flag-row input+input{flex:1;}
@media(max-width:900px){.profile-layout{grid-template-columns:1fr;}.stats-strip .container{grid-template-columns:repeat(2,1fr);}.stat-item:nth-child(2){border-right:none;}.hero-content{flex-direction:column;align-items:flex-start;}.logout-btn{margin-left:0;}}
</style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">&#x1F34E; Food Myth Buster</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="community.html">Community</a>
      <a href="resources.html">Resources</a>
      <a href="contact-and-info.html">Contact &amp; Info</a>
      <button id="adminBtn" class="btn-login" style="display:none;">Admin</button>
      <button id="loginBtn" class="btn-login">Login</button>
    </nav>
  </div>
</header>
<div id="appRoot"><div style="display:flex;align-items:center;justify-content:center;min-height:60vh;"><div style="font-size:40px;animation:spin 1s linear infinite;">&#x1F534;</div></div></div>
<footer><div class="container"><p>&#x1F34E; Food Myth Buster &nbsp;&bull;&nbsp; &copy; 2026 Mapua Malayan Colleges Mindanao</p></div></footer>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script>
var SB_URL = 'https://gyrqdwypsqdeeqzmkdze.supabase.co';
var currentUser = null, profile = null, bookmarks = [], submissions = [], votes = [];
var COUNTRIES = [
  {f:'🇵🇭',n:'Philippines'},{f:'🇺🇸',n:'United States'},{f:'🇬🇧',n:'United Kingdom'},
  {f:'🇯🇵',n:'Japan'},{f:'🇰🇷',n:'South Korea'},{f:'🇨🇳',n:'China'},{f:'🇸🇬',n:'Singapore'},
  {f:'🇦🇺',n:'Australia'},{f:'🇨🇦',n:'Canada'},{f:'🇩🇪',n:'Germany'},{f:'🇫🇷',n:'France'},
  {f:'🇧🇷',n:'Brazil'},{f:'🇮🇳',n:'India'},{f:'🇲🇾',n:'Malaysia'},{f:'🇮🇩',n:'Indonesia'},
  {f:'🇹🇭',n:'Thailand'},{f:'🇻🇳',n:'Vietnam'},{f:'🇮🇹',n:'Italy'},{f:'🇪🇸',n:'Spain'},
  {f:'🇲🇽',n:'Mexico'},{f:'🇿🇦',n:'South Africa'},{f:'🇳🇬',n:'Nigeria'},{f:'🇪🇬',n:'Egypt'},
  {f:'🇦🇷',n:'Argentina'},{f:'🇨🇱',n:'Chile'},{f:'🇺🇦',n:'Ukraine'},{f:'🇵🇱',n:'Poland'},
  {f:'🇸🇪',n:'Sweden'},{f:'🇳🇴',n:'Norway'},{f:'🇳🇿',n:'New Zealand'},
];

async function init() {
  var s = await sb.auth.getSession();
  if (!s.data.session) { showNotLoggedIn(); return; }
  currentUser = s.data.session.user;
  await loadAll();
}

async function loadAll() {
  var [bRes, sRes, vRes, pRes] = await Promise.all([
    sb.from('bookmarks').select('*,myths(id,title,verdict,views,categories(name,slug,icon))').eq('user_id', currentUser.id).order('created_at',{ascending:false}),
    sb.from('myth_submissions').select('*,categories(name,icon)').eq('user_id', currentUser.id).order('created_at',{ascending:false}),
    sb.from('myth_votes').select('myth_id,vote,myths(title)').eq('user_id', currentUser.id),
    sb.from('user_profiles').select('*').eq('id', currentUser.id).single()
  ]);
  bookmarks = (bRes.data||[]).filter(function(b){return b.myths;});
  submissions = sRes.data||[];
  votes = vRes.data||[];
  profile = pRes.data||null;
  render();
}

function getLevel(n) {
  if (n>=200) return {label:'🌟 Legend',cls:'level-legend',prog:100,next:null};
  if (n>=100) return {label:'🥇 Gold',cls:'level-gold',prog:Math.round((n-100)/100*100),next:200};
  if (n>=30) return {label:'🥈 Silver',cls:'level-silver',prog:Math.round((n-30)/70*100),next:100};
  return {label:'🥉 Bronze',cls:'level-bronze',prog:Math.round(n/30*100),next:30};
}

function render() {
  var u = currentUser;
  var dn = (profile && profile.display_name) || u.user_metadata && u.user_metadata.full_name || u.email.split('@')[0];
  var avatarLetter = dn.charAt(0).toUpperCase();
  var avatarSrc = profile && profile.avatar_url ? profile.avatar_url : null;
  var isAdmin = (u.user_metadata && u.user_metadata.role==='admin') || (profile && profile.is_admin);
  var joinDate = new Date(u.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long'});
  var level = getLevel(submissions.length*10 + bookmarks.length*2);
  var approved = submissions.filter(function(s){return s.status==='APPROVED';}).length;
  var flagEmoji = profile && profile.country_flag ? profile.country_flag : '';
  var countryName = profile && profile.country ? profile.country : '';

  var avatarHTML = avatarSrc
    ? '<img src="'+avatarSrc+'" alt="avatar">'
    : '<span style="font-size:36px;font-weight:800;font-family:Sora,sans-serif;">'+avatarLetter+'</span>';

  var countryOptions = COUNTRIES.map(function(c){
    var sel = countryName===c.n ? ' selected' : '';
    return '<option value="'+c.n+'" data-flag="'+c.f+'"'+sel+'>'+c.f+' '+c.n+'</option>';
  }).join('');

  var html = `
  <section class="profile-hero">
    <div class="container">
      <div class="hero-content">
        <div class="avatar-wrap">
          <div class="avatar-ring">${avatarHTML}</div>
          <button class="avatar-edit-btn" onclick="document.getElementById('avatarInput').click()" title="Change photo">&#x1F4F7;</button>
          <input type="file" id="avatarInput" accept="image/*" onchange="uploadAvatar(this)">
        </div>
        <div class="hero-text">
          <h1>${dn} ${flagEmoji}</h1>
          <div class="email">${u.email}</div>
          <div class="hero-badges">
            <span class="hero-badge">Since ${joinDate}</span>
            <span class="hero-badge ${isAdmin?'admin':''}">${isAdmin?'⚡ Admin':'👤 Member'}</span>
            <span class="hero-badge">${level.label}</span>
            ${countryName ? '<span class="hero-badge">'+flagEmoji+' '+countryName+'</span>' : ''}
          </div>
        </div>
        <button class="logout-btn" onclick="handleLogout()">Sign Out</button>
      </div>
    </div>
  </section>

  <div class="stats-strip">
    <div class="container">
      <div class="stat-item"><span class="stat-num">${bookmarks.length}</span><span class="stat-label">Bookmarks</span></div>
      <div class="stat-item"><span class="stat-num">${submissions.length}</span><span class="stat-label">Submitted</span></div>
      <div class="stat-item"><span class="stat-num">${approved}</span><span class="stat-label">Approved</span></div>
      <div class="stat-item"><span class="stat-num">${votes.length}</span><span class="stat-label">Votes Cast</span></div>
    </div>
  </div>

  <div style="background:#0f0d1e;border-top:1px solid var(--border);">
    <div class="container"><div class="profile-layout">
      <div>
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('bookmarks',this)">🔖 Bookmarks <span class="tab-count">${bookmarks.length}</span></button>
          <button class="tab-btn" onclick="switchTab('submissions',this)">📬 Submissions <span class="tab-count">${submissions.length}</span></button>
          <button class="tab-btn" onclick="switchTab('votes',this)">👍 Votes <span class="tab-count">${votes.length}</span></button>
        </div>
        <div id="tab-bookmarks" class="tab-panel active">${renderBookmarks()}</div>
        <div id="tab-submissions" class="tab-panel">${renderSubmissions()}</div>
        <div id="tab-votes" class="tab-panel">${renderVotes()}</div>
      </div>
      <aside>
        <div class="edit-section">
          <h3>✏️ Edit Profile</h3>
          <div id="editAlert"></div>
          <div class="form-group"><label>Display Name</label>
            <input type="text" id="editName" value="${dn}" placeholder="Your name" maxlength="32">
            <small style="font-size:11px;color:var(--text-muted);margin-top:4px;display:block;">Cannot use "Admin" as display name</small>
          </div>
          <div class="form-group"><label>Bio</label>
            <textarea id="editBio" placeholder="Tell us about yourself...">${profile&&profile.bio?profile.bio:''}</textarea>
          </div>
          <div class="form-group"><label>Birthday</label>
            <input type="date" id="editBirthday" value="${profile&&profile.birthday?profile.birthday:''}">
          </div>
          <div class="form-group"><label>Gender</label>
            <select id="editGender">
              <option value="">Prefer not to say</option>
              <option value="Male" ${profile&&profile.gender==='Male'?'selected':''}>Male</option>
              <option value="Female" ${profile&&profile.gender==='Female'?'selected':''}>Female</option>
              <option value="Non-binary" ${profile&&profile.gender==='Non-binary'?'selected':''}>Non-binary</option>
              <option value="Genderfluid" ${profile&&profile.gender==='Genderfluid'?'selected':''}>Genderfluid</option>
              <option value="Agender" ${profile&&profile.gender==='Agender'?'selected':''}>Agender</option>
              <option value="Transgender" ${profile&&profile.gender==='Transgender'?'selected':''}>Transgender</option>
              <option value="Other" ${profile&&profile.gender==='Other'?'selected':''}>Other / Prefer to self-describe</option>
            </select>
          </div>
          <div class="form-group"><label>Country</label>
            <select id="editCountry" onchange="updateFlag(this)">
              <option value="">Select country</option>
              ${countryOptions}
            </select>
          </div>
          <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
        </div>

        <div class="sidebar-card">
          <div class="sidebar-card-title">📈 Progress — ${level.label}</div>
          ${level.next ? `<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px;"><span>To next level</span><span>${level.prog}%</span></div><div style="height:7px;background:#1a1730;border-radius:7px;overflow:hidden;"><div style="height:100%;width:${level.prog}%;background:linear-gradient(90deg,#7c6bff,#c77dff);border-radius:7px;transition:width 0.8s ease;"></div></div>` : '<p style="font-size:12px;color:var(--text-muted);">Max level reached! 🏆</p>'}
        </div>

        <div class="sidebar-card">
          <div class="sidebar-card-title">🔍 Find Users</div>
          <a href="users.html" style="display:block;padding:10px 14px;background:rgba(124,107,255,0.1);border:1px solid rgba(124,107,255,0.25);border-radius:9px;text-decoration:none;color:#9b8fff;font-size:13px;font-weight:600;text-align:center;">Search Users →</a>
        </div>

        <div class="danger-zone">
          <div class="danger-zone-title">⚠️ Danger Zone</div>
          <button class="danger-btn" onclick="handleLogout()">Sign Out</button>
        </div>
      </aside>
    </div></div>
  </div>`;

  document.getElementById('appRoot').innerHTML = html;
}

function renderBookmarks() {
  if (!bookmarks.length) return '<div class="empty-state"><div class="emoji">🔖</div><h3>No bookmarks</h3><p>Save myths to find them here.</p><a href="browse.html">Browse →</a></div>';
  return bookmarks.map(function(bm,i){
    var m=bm.myths; var vl=m.verdict==='PARTIAL'?'Partial':m.verdict;
    return '<div class="myth-bcard v-'+m.verdict+'" style="animation-delay:'+(i*0.04)+'s"><div class="myth-bcard-top"><div class="myth-bcard-title" onclick="go(\'detail.html?id='+m.id+'\')">'+m.title+'</div><div style="display:flex;gap:5px;align-items:center;flex-shrink:0;"><span class="verdict-badge verdict-'+m.verdict+'">'+vl+'</span><button class="remove-bm" onclick="removeBm('+bm.id+',this)">&#x2715;</button></div></div><div class="myth-bcard-meta"><span style="color:#7c6bff;font-size:10px;font-weight:700;text-transform:uppercase;">'+((m.categories&&m.categories.icon)||'')+' '+(m.categories&&m.categories.name||'General')+'</span><span>&#x1F441; '+(m.views||0)+'</span></div></div>';
  }).join('');
}
function renderSubmissions() {
  if (!submissions.length) return '<div class="empty-state"><div class="emoji">📬</div><h3>No submissions</h3><p>Submit food myths for verification.</p><a href="community.html">Submit →</a></div>';
  var statusMsg = {PENDING:'⏳ Awaiting review',APPROVED:'✅ Approved!',REJECTED:'❌ Not added'};
  return submissions.map(function(s,i){
    var st=s.status||'PENDING';
    return '<div class="sub-card" style="animation-delay:'+(i*0.04)+'s"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px;"><div style="font-family:Sora,sans-serif;font-size:14px;font-weight:700;flex:1;line-height:1.4;">'+s.myth_text+'</div><span class="status-pill status-'+st+'">'+st+'</span></div><div style="font-size:11px;color:var(--text-muted);">'+(s.categories?s.categories.icon+' '+s.categories.name:'General')+(s.suggested_verdict?' &bull; '+s.suggested_verdict:'')+'</div><div style="margin-top:8px;font-size:12px;color:var(--text-muted);">'+statusMsg[st]+'</div></div>';
  }).join('');
}
function renderVotes() {
  if (!votes.length) return '<div class="empty-state"><div class="emoji">👍</div><h3>No votes yet</h3><p>Visit myth pages and vote.</p><a href="browse.html">Browse →</a></div>';
  return votes.map(function(v,i){
    return '<div class="myth-bcard" style="animation-delay:'+(i*0.04)+'s;cursor:default;"><div class="myth-bcard-top"><div class="myth-bcard-title" style="cursor:pointer;" onclick="go(\'detail.html?id='+v.myth_id+'\')">'+(v.myths?v.myths.title:'Unknown myth')+'</div><span style="font-size:20px;">'+(v.vote==='up'?'👍':'👎')+'</span></div></div>';
  }).join('');
}

function switchTab(n,btn) {
  document.querySelectorAll('.tabs .tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  btn.classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
}
function go(url) { window.location.href = url; }

async function removeBm(id, btn) {
  btn.textContent = '…';
  var r = await sb.from('bookmarks').delete().eq('id',id);
  if (!r.error) { bookmarks = bookmarks.filter(function(b){return b.id!==id;}); document.getElementById('tab-bookmarks').innerHTML = renderBookmarks(); }
}

async function uploadAvatar(input) {
  if (!input.files||!input.files[0]) return;
  var file = input.files[0];
  if (file.size > 2097152) { alert('Image must be under 2MB'); return; }
  var ext = file.name.split('.').pop();
  var path = currentUser.id+'/avatar.'+ext;
  var res = await sb.storage.from('avatars').upload(path, file, {upsert:true});
  if (res.error) { alert('Upload failed: '+res.error.message); return; }
  var url = 'https://gyrqdwypsqdeeqzmkdze.supabase.co/storage/v1/object/public/avatars/'+path+'?t='+Date.now();
  await sb.from('user_profiles').upsert({id:currentUser.id, avatar_url:url},{onConflict:'id'});
  profile = profile||{}; profile.avatar_url = url;
  var ring = document.querySelector('.avatar-ring');
  if (ring) ring.innerHTML = '<img src="'+url+'" alt="avatar">';
}

function updateFlag(sel) {
  var opt = sel.options[sel.selectedIndex];
  document.getElementById('editName'); // flag will show after save
}

async function saveProfile() {
  var btn = document.getElementById('saveBtn');
  var nameVal = (document.getElementById('editName').value||'').trim();
  var bioVal = document.getElementById('editBio').value.trim();
  var bdayVal = document.getElementById('editBirthday').value;
  var genderVal = document.getElementById('editGender').value;
  var countryEl = document.getElementById('editCountry');
  var countryVal = countryEl.value;
  var flagVal = countryEl.value ? countryEl.options[countryEl.selectedIndex].dataset.flag||'' : '';
  var alertEl = document.getElementById('editAlert');

  if (nameVal.toLowerCase() === 'admin') {
    alertEl.innerHTML = '<div class="alert alert-error">Display name cannot be "Admin".</div>';
    return;
  }
  if (nameVal.length < 2) {
    alertEl.innerHTML = '<div class="alert alert-error">Name must be at least 2 characters.</div>';
    return;
  }

  btn.disabled = true; btn.textContent = 'Saving…';
  var res = await sb.from('user_profiles').upsert({
    id: currentUser.id,
    display_name: nameVal,
    bio: bioVal,
    birthday: bdayVal||null,
    gender: genderVal||null,
    country: countryVal||null,
    country_flag: flagVal||null,
    updated_at: new Date().toISOString()
  },{onConflict:'id'});
  btn.disabled = false; btn.textContent = 'Save Changes';
  if (res.error) {
    alertEl.innerHTML = '<div class="alert alert-error">Error: '+res.error.message+'</div>';
  } else {
    alertEl.innerHTML = '<div class="alert alert-success">✓ Saved!</div>';
    profile = Object.assign(profile||{}, {display_name:nameVal,bio:bioVal,birthday:bdayVal,gender:genderVal,country:countryVal,country_flag:flagVal});
    setTimeout(function(){ alertEl.innerHTML=''; }, 2500);
  }
}

async function handleLogout() {
  await sb.auth.signOut();
  window.location.href = '../index.html';
}

function showNotLoggedIn() {
  document.getElementById('appRoot').innerHTML = '<div class="not-logged-in"><div style="font-size:60px;margin-bottom:12px;">🔒</div><h2>Sign in to view your profile</h2><p>Your bookmarks, submissions, and activity are saved here.</p><button onclick="openAuthOverlay()">Sign In / Register</button></div>';
}

init();
</script>
</body></html>
