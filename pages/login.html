<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Myth Buster</title>
    <meta name="description" content="Login or create an account to submit myths, vote, and bookmark your favourites.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #6c63ff; --primary-dark: #5649e0; --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7f0; --surface: #f8f7ff; }
        body { font-family: 'DM Sans', sans-serif; color: var(--text); }

        .auth-page { min-height: 100vh; background: linear-gradient(135deg, #6c63ff 0%, #9b59b6 60%, #764ba2 100%); display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; overflow: hidden; }
        .auth-page::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Crect x='0' y='0' width='2' height='2'/%3E%3C/g%3E%3C/svg%3E"); }

        .auth-card { background: white; border-radius: 24px; padding: 48px; width: 100%; max-width: 440px; box-shadow: 0 24px 80px rgba(0,0,0,0.2); position: relative; animation: slideUp 0.4s ease both; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .auth-logo { text-align: center; margin-bottom: 32px; }
        .auth-logo .logo { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 800; color: var(--primary); }
        .auth-logo p { color: var(--text-muted); margin-top: 6px; font-size: 14px; }

        .auth-tabs { display: flex; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 32px; }
        .auth-tab { flex: 1; padding: 10px; border: none; background: transparent; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--text-muted); font-family: 'DM Sans', sans-serif; }
        .auth-tab.active { background: white; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: 'DM Sans', sans-serif; transition: border-color 0.2s, box-shadow 0.2s; outline: none; background: var(--surface); color: var(--text); }
        .form-group input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(108,99,255,0.1); }

        .auth-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, #6c63ff, #9b59b6); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.25s; margin-top: 8px; font-family: 'Sora', sans-serif; letter-spacing: 0.3px; }
        .auth-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.35); }
        .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }

        .divider { text-align: center; color: var(--text-muted); font-size: 13px; margin: 20px 0; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--border); }
        .divider::before { left: 0; } .divider::after { right: 0; }

        .alt-link { text-align: center; font-size: 14px; color: var(--text-muted); }
        .alt-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .alt-link a:hover { text-decoration: underline; }

        .back-link { display: block; text-align: center; margin-top: 24px; color: var(--primary); text-decoration: none; font-size: 14px; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }

        .alert { padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 18px; display: none; }
        .alert-error { background: #fee2e2; color: #7f1d1d; border: 1px solid #fca5a5; display: block; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; display: block; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo">🍎 Food Myth Buster</div>
                <p>Join the community of myth busters</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="alertBox" class="alert"></div>

            <div id="loginForm">
                <div class="form-group"><label>Email Address</label><input type="email" id="loginEmail" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="Your password"></div>
                <button class="auth-submit" id="loginBtn" onclick="handleLogin()">Login</button>
                <div class="divider">or</div>
                <p class="alt-link">Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up free</a></p>
            </div>

            <div id="signupForm" style="display:none">
                <div class="form-group"><label>Full Name</label><input type="text" id="signupName" placeholder="Your name"></div>
                <div class="form-group"><label>Email Address</label><input type="email" id="signupEmail" placeholder="you@example.com"></div>
                <div class="form-group"><label>Password</label><input type="password" id="signupPassword" placeholder="At least 6 characters"></div>
                <button class="auth-submit" id="signupBtn" onclick="handleSignup()">Create Account</button>
                <div class="divider">or</div>
                <p class="alt-link">Already have an account? <a href="#" onclick="switchTab('login')">Login</a></p>
            </div>

            <a href="../index.html" class="back-link">← Back to Food Myth Buster</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        sb.auth.getSession().then(function(res) { if (res.data.session) window.location.href = '../index.html'; });

        function switchTab(tab) {
            var isLogin = tab === 'login';
            document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('signupForm').style.display = isLogin ? 'none' : 'block';
            document.getElementById('loginTab').classList.toggle('active', isLogin);
            document.getElementById('signupTab').classList.toggle('active', !isLogin);
            hideAlert();
        }

        function showAlert(msg, type) {
            var box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = 'alert alert-' + (type || 'error');
        }
        function hideAlert() { document.getElementById('alertBox').className = 'alert'; }

        async function handleLogin() {
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;
            var btn = document.getElementById('loginBtn');
            if (!email || !password) { showAlert('Please fill in all fields.'); return; }
            btn.disabled = true; btn.textContent = 'Logging in…';
            var res = await sb.auth.signInWithPassword({ email, password });
            if (res.error) { showAlert(res.error.message); btn.disabled = false; btn.textContent = 'Login'; }
            else {
                showAlert('Welcome back! Redirecting…', 'success');
                setTimeout(function() {
                    if (window.parent && window.parent !== window && window.parent.closeAuthOverlay) {
                        window.parent.location.reload();
                    } else {
                        window.location.href = '../index.html';
                    }
                }, 800);
            }
        }

        async function handleSignup() {
            var name = document.getElementById('signupName').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;
            var btn = document.getElementById('signupBtn');
            if (!name || !email || !password) { showAlert('Please fill in all fields.'); return; }
            if (password.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
            btn.disabled = true; btn.textContent = 'Creating account…';
            var res = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
            if (res.error) { showAlert(res.error.message); btn.disabled = false; btn.textContent = 'Create Account'; }
            else { showAlert('Account created! Check your email to confirm, then login.', 'success'); btn.disabled = false; btn.textContent = 'Create Account'; }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var loginVisible = document.getElementById('loginForm').style.display !== 'none';
                loginVisible ? handleLogin() : handleSignup();
            }
        });
    </script>
</body>
</html>
