<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - Food Myth Buster</title>
    <meta name="description" content="Your Food Myth Buster profile — bookmarks, submissions and activity.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #6c63ff; --primary-dark: #5649e0; --purple-soft: #f0eeff; --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7f0; --surface: #f8f7ff; --true: #10b981; --false: #ef4444; --partial: #f59e0b; }
        body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--surface); line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

        header { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 16px 0; position: sticky; top: 0; z-index: 200; border-bottom: 1px solid var(--border); box-shadow: 0 1px 20px rgba(108,99,255,0.08); }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; color: var(--primary); }
        nav { display: flex; gap: 8px; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        nav a:hover { background: var(--purple-soft); color: var(--primary); }
        .btn-login { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .profile-hero { background: linear-gradient(135deg, #6c63ff 0%, #9b59b6 60%, #764ba2 100%); padding: 48px 24px; position: relative; overflow: hidden; }
        .profile-hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Crect x='0' y='0' width='2' height='2'/%3E%3C/g%3E%3C/svg%3E"); }
        .profile-hero-inner { position: relative; display: flex; align-items: center; gap: 28px; flex-wrap: wrap; }
        .avatar-lg { width: 88px; height: 88px; border-radius: 50%; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); display: flex; align-items: center; justify-content: center; font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 800; color: white; flex-shrink: 0; }
        .profile-info h1 { font-family: 'Sora', sans-serif; font-size: 30px; font-weight: 800; color: white; margin-bottom: 4px; letter-spacing: -0.5px; }
        .profile-info p { color: rgba(255,255,255,0.75); font-size: 14px; }
        .profile-stats { display: flex; gap: 28px; margin-top: 16px; flex-wrap: wrap; }
        .profile-stat-num { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; color: white; display: block; }
        .profile-stat-label { font-size: 12px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.5px; }

        .profile-layout { display: grid; grid-template-columns: 220px 1fr; gap: 28px; padding: 36px 0 60px; align-items: start; }

        .sidebar-nav { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 16px; position: sticky; top: 90px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text-muted); transition: all 0.2s; border: none; background: none; width: 100%; text-align: left; font-family: 'DM Sans', sans-serif; }
        .nav-item:hover { background: var(--purple-soft); color: var(--primary); }
        .nav-item.active { background: var(--purple-soft); color: var(--primary); font-weight: 700; }
        .nav-item .icon { font-size: 18px; }
        .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .panel-title { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .myth-row { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 16px; cursor: pointer; transition: all 0.2s; animation: fadeInUp 0.3s ease both; }
        .myth-row:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(108,99,255,0.1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .myth-row h4 { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 4px; flex: 1; line-height: 1.3; }
        .myth-row .meta { font-size: 12px; color: var(--text-muted); }
        .bookmark-remove { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px; padding: 4px; border-radius: 6px; transition: all 0.2s; flex-shrink: 0; }
        .bookmark-remove:hover { color: var(--false); background: #fee2e2; }

        .verdict-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-weight: 700; font-size: 11px; font-family: 'Sora', sans-serif; flex-shrink: 0; }
        .verdict-TRUE { background: #d1fae5; color: #065f46; border: 1.5px solid #6ee7b7; }
        .verdict-FALSE { background: #fee2e2; color: #7f1d1d; border: 1.5px solid #fca5a5; }
        .verdict-PARTIALLY_TRUE { background: #fef3c7; color: #78350f; border: 1.5px solid #fcd34d; }

        .empty-panel { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-panel .emoji { font-size: 48px; margin-bottom: 14px; }
        .empty-panel h3 { font-family: 'Sora', sans-serif; font-size: 18px; margin-bottom: 8px; color: var(--text); }
        .empty-panel a { display: inline-block; margin-top: 16px; padding: 10px 24px; background: var(--primary); color: white; border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 14px; }

        .settings-card { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; }
        .settings-card h3 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 20px; }
        .form-row { margin-bottom: 18px; }
        .form-row label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
        .form-row input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; background: var(--surface); }
        .form-row input:focus { border-color: var(--primary); background: white; }
        .save-btn { padding: 11px 24px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .save-btn:hover { background: var(--primary-dark); }
        .danger-btn { padding: 11px 24px; background: white; color: var(--false); border: 1.5px solid var(--false); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .danger-btn:hover { background: var(--false); color: white; }

        .skeleton { background: linear-gradient(90deg, #f0eeff 25%, #e8e4ff 50%, #f0eeff 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .not-logged-in { text-align: center; padding: 80px 20px; }
        .not-logged-in .emoji { font-size: 64px; margin-bottom: 16px; }
        .not-logged-in h2 { font-family: 'Sora', sans-serif; font-size: 24px; margin-bottom: 8px; }
        .not-logged-in p { color: var(--text-muted); margin-bottom: 24px; }
        .not-logged-in a { display: inline-block; padding: 12px 28px; background: var(--primary); color: white; border-radius: 10px; text-decoration: none; font-weight: 700; font-family: 'Sora', sans-serif; }

        footer { background: #1a1a2e; color: rgba(255,255,255,0.6); padding: 32px 0; text-align: center; font-size: 14px; }
        footer p { margin: 4px 0; }

        @media (max-width: 768px) { .profile-layout { grid-template-columns: 1fr; } .sidebar-nav { position: static; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🍎 Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <button id="loginBtn" class="btn-login">Login</button>
            </nav>
        </div>
    </header>

    <div id="pageContent">
        <div style="text-align:center;padding:100px 20px;color:var(--text-muted);">Loading…</div>
    </div>

    <footer>
        <div class="container">
            <p>🍎 Food Myth Buster &nbsp;•&nbsp; Evidence-based food science</p>
            <p>© 2025 Food Myth Buster. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        var currentUser = null;
        var bookmarks = [];
        var submissions = [];

        async function init() {
            var res = await sb.auth.getSession();
            if (!res.data.session) {
                document.getElementById('pageContent').innerHTML =
                    '<div class="container"><div class="not-logged-in">' +
                        '<div class="emoji">🔒</div>' +
                        '<h2>You\'re not logged in</h2>' +
                        '<p>Create an account or login to view your profile, bookmarks and submissions.</p>' +
                        '<a href="login.html">Login / Sign Up</a>' +
                    '</div></div>';
                return;
            }
            currentUser = res.data.session.user;
            await loadProfile();
        }

        async function loadProfile() {
            var name = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
            var initial = name.charAt(0).toUpperCase();
            var joinDate = new Date(currentUser.created_at).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
            var profileImage = currentUser.user_metadata?.avatar_url || null;

            var bmRes = await sb.from('bookmarks').select('*, myths(id, title, verdict, summary)').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            bookmarks = (bmRes.data || []).filter(function(b) { return b.myths; });

            var subRes = await sb.from('myth_submissions').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
            submissions = subRes.data || [];

            document.getElementById('pageContent').innerHTML =
                '<section class="profile-hero">' +
                    '<div class="container"><div class="profile-hero-inner">' +
                        '<div class="avatar-lg" id="profileAvatar">' + (profileImage ? '<img src="' + profileImage + '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">' : initial) + '</div>' +
                        '<div class="profile-info">' +
                            '<h1>' + name + '</h1>' +
                            '<p>Member since ' + joinDate + ' &nbsp;•&nbsp; ' + currentUser.email + '</p>' +
                            '<div class="profile-stats">' +
                                '<div><span class="profile-stat-num">' + bookmarks.length + '</span><span class="profile-stat-label">Bookmarks</span></div>' +
                                '<div><span class="profile-stat-num">' + submissions.length + '</span><span class="profile-stat-label">Submissions</span></div>' +
                            '</div>' +
                        '</div>' +
                    '</div></div>' +
                '</section>' +
                '<div class="container">' +
                    '<div class="profile-layout">' +
                        '<aside class="sidebar-nav">' +
                            '<button class="nav-item active" onclick="showTab(\'bookmarks\', this)"><span class="icon">🔖</span> Bookmarks</button>' +
                            '<button class="nav-item" onclick="showTab(\'submissions\', this)"><span class="icon">📬</span> Submissions</button>' +
                            '<div class="nav-divider"></div>' +
                            '<button class="nav-item" onclick="showTab(\'settings\', this)"><span class="icon">⚙️</span> Settings</button>' +
                            '<div class="nav-divider"></div>' +
                            '<button class="nav-item" onclick="handleLogout()" style="color:#ef4444;"><span class="icon">🚪</span> Logout</button>' +
                        '</aside>' +
                        '<div>' +
                            '<div class="tab-panel active" id="tab-bookmarks">' + renderBookmarks() + '</div>' +
                            '<div class="tab-panel" id="tab-submissions">' + renderSubmissions() + '</div>' +
                            '<div class="tab-panel" id="tab-settings">' + renderSettings(name, currentUser.email, profileImage) + '</div>' +
                        '</div>' +
                    '</div>' +
                '</div>';
        }

        function renderBookmarks() {
            var html = '<div class="panel-title">🔖 My Bookmarks</div>';
            if (bookmarks.length === 0) {
                return html + '<div class="empty-panel"><div class="emoji">🔖</div><h3>No bookmarks yet</h3><p>Save myths you want to revisit later.</p><a href="browse.html">Browse Myths</a></div>';
            }
            bookmarks.forEach(function(b, i) {
                html += '<div class="myth-row" style="animation-delay:' + (i * 0.05) + 's">' +
                    '<span class="verdict-badge verdict-' + b.myths.verdict + '">' + b.myths.verdict.replace('_', ' ') + '</span>' +
                    '<div style="flex:1" onclick="window.location.href=\'detail.html?id=' + b.myths.id + '\'">' +
                        '<h4>' + b.myths.title + '</h4>' +
                        '<div class="meta">' + (b.myths.summary ? b.myths.summary.substring(0, 80) + '…' : '') + '</div>' +
                    '</div>' +
                    '<button class="bookmark-remove" onclick="removeBookmark(\'' + b.id + '\', this)" title="Remove bookmark">🗑</button>' +
                '</div>';
            });
            return html;
        }

        function renderSubmissions() {
            var html = '<div class="panel-title">📬 My Submissions</div>';
            if (submissions.length === 0) {
                return html + '<div class="empty-panel"><div class="emoji">📬</div><h3>No submissions yet</h3><p>Submit a food myth for our team to verify.</p><a href="community.html">Submit a Myth</a></div>';
            }
            submissions.forEach(function(s, i) {
                var statusColor = s.status === 'approved' ? '#10b981' : s.status === 'rejected' ? '#ef4444' : '#f59e0b';
                var statusLabel = s.status ? s.status.charAt(0).toUpperCase() + s.status.slice(1) : 'Pending';
                html += '<div class="myth-row" style="animation-delay:' + (i * 0.05) + 's;cursor:default">' +
                    '<div style="flex:1">' +
                        '<h4>' + s.myth_text + '</h4>' +
                        '<div class="meta">Submitted ' + new Date(s.created_at).toLocaleDateString() + '</div>' +
                    '</div>' +
                    '<span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:' + statusColor + '20;color:' + statusColor + ';border:1.5px solid ' + statusColor + '40;">' + statusLabel + '</span>' +
                '</div>';
            });
            return html;
        }

        function renderSettings(name, email, profileImage) {
            return '<div class="panel-title">⚙️ Settings</div>' +
                '<div class="settings-card">' +
                    '<h3>Profile Information</h3>' +
                    '<div class="form-row"><label>Full Name</label><input type="text" id="settingsName" value="' + name + '"></div>' +
                    '<div class="form-row"><label>Profile Picture</label><input type="file" id="profileImageInput" accept="image/*" onchange="uploadProfileImage()"></div>' +
                    (profileImage ? '<div class="form-row"><img src="' + profileImage + '" alt="Current profile" style="width:50px;height:50px;border-radius:50%;"></div>' : '') +
                    '<div class="form-row"><label>Email</label><input type="email" value="' + email + '" disabled style="opacity:0.6;cursor:not-allowed;"></div>' +
                    '<button class="save-btn" onclick="saveSettings()">Save Changes</button>' +
                '</div>' +
                '<div class="settings-card">' +
                    '<h3>Account</h3>' +
                    '<button class="danger-btn" onclick="handleLogout()">🚪 Logout</button>' +
                '</div>';
        }

        function showTab(name, btn) {
            document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.nav-item').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('tab-' + name).classList.add('active');
            btn.classList.add('active');
        }

        async function removeBookmark(bookmarkId, btn) {
            btn.disabled = true;
            await sb.from('bookmarks').delete().eq('id', bookmarkId);
            bookmarks = bookmarks.filter(function(b) { return b.id !== bookmarkId; });
            document.getElementById('tab-bookmarks').innerHTML = renderBookmarks();
        }

        async function saveSettings() {
            var name = document.getElementById('settingsName').value.trim();
            if (!name) return;
            await sb.auth.updateUser({ data: { full_name: name } });
            alert('Profile updated!');
        }

        async function uploadProfileImage() {
            var file = document.getElementById('profileImageInput').files[0];
            if (!file) return;
            var fileExt = file.name.split('.').pop();
            var fileName = currentUser.id + '.' + fileExt;
            var filePath = 'avatars/' + fileName;
            var { error: uploadError } = await sb.storage.from('user-avatars').upload(filePath, file, { upsert: true });
            if (uploadError) {
                alert('Error uploading image: ' + uploadError.message);
                return;
            }
            var { data } = sb.storage.from('user-avatars').getPublicUrl(filePath);
            await sb.auth.updateUser({ data: { avatar_url: data.publicUrl } });
            document.getElementById('profileAvatar').innerHTML = '<img src="' + data.publicUrl + '" alt="Profile" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">';
            alert('Profile picture updated!');
        }

        async function handleLogout() {
            await sb.auth.signOut();
            window.location.href = '../index.html';
        }

        init();
    </script>
</body>
</html>
