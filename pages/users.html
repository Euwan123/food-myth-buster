<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Find Users - Food Myth Buster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
    
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:#3a3560;border-radius:3px}
.container{max-width:900px;margin:0 auto;padding:0 24px;}
header{background:rgba(13,11,30,0.97);backdrop-filter:blur(16px);padding:14px 0;position:sticky;top:0;z-index:1000;border-bottom:1px solid var(--border);}
header .container{display:flex;justify-content:space-between;align-items:center;}
.logo{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(135deg,#7c6bff,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;}
nav{display:flex;gap:4px;align-items:center;}
nav a{color:var(--text-muted);text-decoration:none;padding:7px 12px;border-radius:8px;font-size:13px;font-weight:500;transition:all 0.2s;}
nav a:hover{background:rgba(124,107,255,0.15);color:var(--text);}
.btn-login{background:linear-gradient(135deg,#7c6bff,#9b6bff);color:white;border:none;padding:8px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.hero{background:linear-gradient(135deg,#1a1530,#0f0d20);border-bottom:1px solid var(--border);padding:48px 24px;text-align:center;}
.hero h1{font-family:'Sora',sans-serif;font-size:34px;font-weight:800;margin-bottom:8px;}
.hero p{color:var(--text-muted);}
.search-bar-wrap{padding:28px 0 0;}
.search-bar{display:flex;gap:10px;max-width:560px;margin:0 auto;}
.search-bar input{flex:1;padding:12px 18px;background:#1a1530;border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);outline:none;font-family:'DM Sans',sans-serif;}
.search-bar input:focus{border-color:#7c6bff;}
.search-bar button{padding:12px 22px;background:#7c6bff;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;}
.results{padding:28px 0 60px;}
.user-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;margin-bottom:10px;transition:all 0.2s;cursor:pointer;}
.user-card:hover{border-color:#3a3560;background:#1a1730;}
.user-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#7c6bff,#9b59b6);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:white;font-family:'Sora',sans-serif;overflow:hidden;flex-shrink:0;}
.user-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.user-info{flex:1;}
.user-name{font-family:'Sora',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;}
.user-meta{font-size:12px;color:var(--text-muted);}
.view-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.view-btn:hover{border-color:#7c6bff;color:#7c6bff;}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted);}
.empty .emo{font-size:48px;margin-bottom:12px;}
footer{background:#080714;border-top:1px solid var(--border);color:var(--text-muted);padding:24px 0;text-align:center;font-size:13px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#161330;border:1px solid var(--border);border-radius:20px;padding:28px;max-width:500px;width:100%;margin:20px;position:relative;max-height:90vh;overflow-y:auto;}
.modal-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal h2{font-family:'Sora',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px;}
.modal .role-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:16px;}
.role-admin{background:rgba(255,215,0,0.15);color:#ffd700;border:1px solid rgba(255,215,0,0.3);}
.role-member{background:rgba(124,107,255,0.15);color:#9b8fff;border:1px solid rgba(124,107,255,0.3);}
.profile-detail-row{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.profile-detail-row:last-of-type{border-bottom:none;}
.profile-detail-label{color:var(--text-muted);width:90px;flex-shrink:0;}
.report-section{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);}
.report-section h4{font-family:'Sora',sans-serif;font-size:13px;font-weight:700;color:#ff5c6b;margin-bottom:12px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-muted);margin-bottom:5px;}
.form-group select,.form-group textarea{width:100%;padding:9px 12px;background:#0d0b1e;border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;}
.form-group select:focus,.form-group textarea:focus{border-color:#7c6bff;}
.form-group select option{background:#1a1530;}
.report-btn{width:100%;padding:10px;border-radius:9px;border:none;background:rgba(255,92,107,0.15);color:#ff5c6b;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;border:1px solid rgba(255,92,107,0.3);}
.report-btn:hover{background:rgba(255,92,107,0.25);}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:10px;}
.alert-success{background:rgba(16,217,136,0.1);border:1px solid rgba(16,217,136,0.2);color:#10d988;}
.alert-error{background:rgba(255,92,107,0.1);border:1px solid rgba(255,92,107,0.2);color:#ff5c6b;}
.avatar-large{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#7c6bff,#9b59b6);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:white;font-family:'Sora',sans-serif;overflow:hidden;margin:0 auto 14px;}
.avatar-large img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
</style>
</head>
<body>
<header>
  <div class="container">
    <a href="../index.html" class="logo">&#x1F34E; Food Myth Buster</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="browse.html">Browse</a>
      <a href="community.html">Community</a>
      <button id="adminBtn" class="btn-login" style="display:none;">Admin</button>
      <button id="loginBtn" class="btn-login">Login</button>
      <button id="themeToggle" class="btn-secondary" title="Toggle theme">🌗</button>
    </nav>
  </div>
</header>
<section class="hero">
  <div class="container">
    <h1>&#x1F50D; Find Users</h1>
    <p>Search for members by display name</p>
    <div class="search-bar-wrap">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search display name..." onkeypress="if(event.key==='Enter')doSearch()">
        <button onclick="doSearch()">Search</button>
      </div>
    </div>
  </div>
</section>
<section class="results">
  <div class="container" id="results">
    <div class="empty"><div class="emo">&#x1F465;</div><p>Search for a user above to see results</p></div>
  </div>
</section>
<footer><div class="container"><p>&#x1F34E; Food Myth Buster &nbsp;&bull;&nbsp; &copy; 2026 Mapua Malayan Colleges Mindanao</p></div></footer>

<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&#x00D7;</button>
    <div id="modalContent">Loading...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/theme.js"></script>
<script>
var currentUser = null;
var modalUserId = null;

async function initPage() {
  var s = await sb.auth.getSession();
  if (s.data.session) currentUser = s.data.session.user;
}

async function doSearch() {
  var q = document.getElementById('searchInput').value.trim();
  var results = document.getElementById('results');
  if (!q) return;
  results.innerHTML = '<div class="empty"><div class="emo">&#x23F3;</div><p>Searching...</p></div>';
  var res = await sb.from('user_profiles').select('id,display_name,country,country_flag,avatar_url,is_admin,total_submissions,approved_submissions').ilike('display_name','%'+q+'%').limit(20);
  if (res.error || !res.data || res.data.length === 0) {
    results.innerHTML = '<div class="empty"><div class="emo">&#x1F614;</div><p>No users found for "'+q+'"</p></div>';
    return;
  }
  results.innerHTML = res.data.map(function(u) {
    var letter = (u.display_name||'?').charAt(0).toUpperCase();
    var avatarHTML = u.avatar_url ? '<img src="'+u.avatar_url+'" alt="avatar">' : letter;
    var flag = u.country_flag||'';
    return '<div class="user-card" onclick="viewUser(\''+u.id+'\')">' +
      '<div class="user-avatar">'+avatarHTML+'</div>' +
      '<div class="user-info"><div class="user-name">'+u.display_name+' '+flag+'</div>' +
      '<div class="user-meta">'+(u.is_admin?'⚡ Admin':'👤 Member')+(u.country?' &bull; '+u.country:'')+(u.total_submissions?' &bull; '+u.total_submissions+' submissions':'')+' </div></div>' +
      '<button class="view-btn">View Profile</button></div>';
  }).join('');
}

async function viewUser(uid) {
  modalUserId = uid;
  document.getElementById('profileModal').classList.add('open');
  document.getElementById('modalContent').innerHTML = '<div style="text-align:center;padding:30px;"><div style="font-size:36px;animation:spin 1s linear infinite;">&#x23F3;</div></div>';
  var res = await sb.from('user_profiles').select('*').eq('id',uid).single();
  if (res.error || !res.data) { document.getElementById('modalContent').innerHTML = '<p>Could not load profile.</p>'; return; }
  var u = res.data;
  var letter = (u.display_name||'?').charAt(0).toUpperCase();
  var avatarHTML = u.avatar_url ? '<img src="'+u.avatar_url+'" alt="avatar">' : letter;
  var isMe = currentUser && currentUser.id === uid;
  var reportSection = !isMe && currentUser ? renderReportSection() : '';
  document.getElementById('modalContent').innerHTML = 
    '<div class="avatar-large">'+avatarHTML+'</div>' +
    '<h2 style="text-align:center;">'+(u.display_name||'Unknown')+' '+(u.country_flag||'')+'</h2>' +
    '<div style="text-align:center;margin-bottom:14px;"><span class="role-badge '+(u.is_admin?'role-admin':'role-member')+'">'+(u.is_admin?'⚡ Admin':'👤 Member')+'</span></div>' +
    (u.bio ? '<p style="font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:14px;padding:0 8px;">'+u.bio+'</p>' : '') +
    (u.gender ? '<div class="profile-detail-row"><span class="profile-detail-label">Gender</span><span>'+u.gender+'</span></div>' : '') +
    (u.country ? '<div class="profile-detail-row"><span class="profile-detail-label">Country</span><span>'+u.country_flag+' '+u.country+'</span></div>' : '') +
    '<div class="profile-detail-row"><span class="profile-detail-label">Submissions</span><span>'+u.total_submissions+'</span></div>' +
    '<div class="profile-detail-row"><span class="profile-detail-label">Approved</span><span>'+u.approved_submissions+'</span></div>' +
    reportSection;
}

function renderReportSection() {
  return '<div class="report-section"><h4>&#x26A0;&#xFE0F; Report this user</h4><div id="reportAlert"></div><div class="form-group"><label>Reason</label><select id="reportReason"><option value="">Select reason</option><option>Spam or misleading content</option><option>Inappropriate username</option><option>Harassment or abuse</option><option>Impersonation</option><option>Other</option></select></div><div class="form-group"><label>Details (optional)</label><textarea id="reportDetails" placeholder="Provide more context..." rows="3"></textarea></div><button class="report-btn" onclick="submitReport()">Submit Report</button></div>';
}

async function submitReport() {
  if (!currentUser) { alert('You must be logged in to report.'); return; }
  var reason = document.getElementById('reportReason').value;
  var details = document.getElementById('reportDetails').value;
  var alertEl = document.getElementById('reportAlert');
  if (!reason) { alertEl.innerHTML = '<div class="alert alert-error">Please select a reason.</div>'; return; }
  var res = await sb.from('user_reports').insert({reporter_id:currentUser.id,reported_user_id:modalUserId,reason:reason,details:details});
  if (res.error) { alertEl.innerHTML = '<div class="alert alert-error">'+(res.error.code==='23505'?'You have already reported this user.':'Error submitting report.')+'</div>'; }
  else { alertEl.innerHTML = '<div class="alert alert-success">Report submitted. Thank you.</div>'; }
}

function closeModal() { document.getElementById('profileModal').classList.remove('open'); }

document.getElementById('profileModal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
initPage();
</script>
<style>@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}</style>
</body></html>
