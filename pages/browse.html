<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Myths - Food Myth Buster</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .browse-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 60px 20px;
            text-align: center;
            color: white;
        }
        .browse-hero h1 { font-size: 42px; margin-bottom: 10px; }
        .browse-hero p { font-size: 18px; opacity: 0.9; }

        .filters-bar {
            background: #f7fafc;
            border-bottom: 2px solid #e2e8f0;
            padding: 20px;
            position: sticky;
            top: 72px;
            z-index: 50;
        }
        .filters-bar .container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        .verdict-filter {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }
        .verdict-filter select {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            font-size: 14px;
            cursor: pointer;
            background: white;
        }

        .browse-content { padding: 40px 20px; }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .results-header h2 { font-size: 24px; }
        .results-count { color: #718096; font-size: 14px; }

        .myths-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .myth-list-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .myth-list-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        .myth-list-card .category-tag {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
            color: #667eea;
        }
        .myth-list-card h3 { font-size: 17px; margin-bottom: 12px; line-height: 1.4; }
        .myth-list-card p { font-size: 14px; color: #718096; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .views-count { font-size: 12px; color: #a0aec0; }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #718096;
            grid-column: 1/-1;
        }
        .empty-state .emoji { font-size: 64px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 22px; margin-bottom: 8px; color: #2d3748; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🍎 Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <button id="loginBtn" class="btn-secondary">Login</button>
            </nav>
        </div>
    </header>

    <section class="browse-hero">
        <div class="container">
            <h1>Browse Food Myths</h1>
            <p>Explore myths by category and verdict — all backed by evidence</p>
        </div>
    </section>

    <div class="filters-bar">
        <div class="container">
            <button class="filter-btn active" data-category="all">All Categories</button>
            <div id="categoryFilters"></div>
            <div class="verdict-filter">
                <select id="verdictFilter">
                    <option value="all">All Verdicts</option>
                    <option value="TRUE">True</option>
                    <option value="FALSE">False</option>
                    <option value="PARTIALLY_TRUE">Partially True</option>
                </select>
            </div>
        </div>
    </div>

    <section class="browse-content">
        <div class="container">
            <div class="results-header">
                <h2 id="sectionTitle">All Myths</h2>
                <span class="results-count" id="resultsCount">Loading...</span>
            </div>
            <div id="mythsList" class="myths-list">
                <div class="loading">Loading myths...</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>🍎 Food Myth Buster</p>
            <p>© 2025 Food Myth Buster. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        let allMyths = [];
        let activeCategory = 'all';
        let activeVerdict = 'all';

        // Read category from URL
        const urlParams = new URLSearchParams(window.location.search);
        const urlCategory = urlParams.get('category');
        if (urlCategory) activeCategory = urlCategory;

        async function loadBrowsePage() {
            await Promise.all([loadCategories(), loadMyths()]);
        }

        async function loadCategories() {
            const { data: categories, error } = await sb.from('categories').select('*').order('name');
            if (error || !categories) return;

            const container = document.getElementById('categoryFilters');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (activeCategory === cat.slug ? ' active' : '');
                btn.textContent = `${cat.icon} ${cat.name}`;
                btn.dataset.category = cat.slug;
                btn.onclick = () => setCategory(cat.slug, cat.name);
                container.appendChild(btn);
            });
        }

        async function loadMyths() {
            const { data: myths, error } = await sb
                .from('myths')
                .select('*, categories(name, slug, color, icon)')
                .order('views', { ascending: false });

            if (error) {
                document.getElementById('mythsList').innerHTML = '<p class="loading">Error loading myths.</p>';
                return;
            }
            allMyths = myths || [];
            renderMyths();
        }

        function setCategory(slug, name) {
            activeCategory = slug;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.category === slug || (slug === 'all' && b.dataset.category === 'all'));
            });
            renderMyths();
        }

        document.getElementById('verdictFilter').addEventListener('change', (e) => {
            activeVerdict = e.target.value;
            renderMyths();
        });

        document.querySelector('[data-category="all"]').addEventListener('click', () => setCategory('all', 'All'));

        function renderMyths() {
            let filtered = allMyths;
            if (activeCategory !== 'all') {
                filtered = filtered.filter(m => m.categories?.slug === activeCategory);
            }
            if (activeVerdict !== 'all') {
                filtered = filtered.filter(m => m.verdict === activeVerdict);
            }

            const container = document.getElementById('mythsList');
            document.getElementById('resultsCount').textContent = `${filtered.length} myth${filtered.length !== 1 ? 's' : ''} found`;

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🔍</div>
                        <h3>No myths found</h3>
                        <p>Try a different category or verdict filter</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            filtered.forEach(myth => {
                const card = document.createElement('div');
                card.className = 'myth-list-card';
                card.onclick = () => window.location.href = `detail.html?id=${myth.id}`;
                card.innerHTML = `
                    <div class="category-tag">${myth.categories?.icon || ''} ${myth.categories?.name || 'General'}</div>
                    <h3>${myth.title}</h3>
                    <p>${myth.summary || ''}</p>
                    <div class="card-footer">
                        <span class="verdict-badge verdict-${myth.verdict}">${myth.verdict.replace('_', ' ')}</span>
                        <span class="views-count">👁 ${myth.views || 0} views</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        loadBrowsePage();
    </script>
</body>
</html>
