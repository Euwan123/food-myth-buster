<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myth Detail - Food Myth Buster</title>
    <meta name="description" content="Evidence-based analysis of food myths — backed by science.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* page-specific overrides only */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        header { background: var(--header-bg); backdrop-filter: blur(12px); padding: 16px 0; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); box-shadow: 0 1px 20px rgba(108,99,255,0.08); }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; color: var(--primary); }
        nav { display: flex; gap: 8px; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        nav a:hover { background: var(--purple-soft); color: var(--primary); }
        .btn-login { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .detail-hero { background: linear-gradient(135deg, #6c63ff 0%, #9b59b6 60%, #764ba2 100%); padding: 60px 24px; color: white; position: relative; overflow: hidden; }
        .detail-hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Crect x='0' y='0' width='2' height='2'/%3E%3C/g%3E%3C/svg%3E"); }
        .hero-inner { position: relative; }
        .breadcrumb { font-size: 13px; opacity: 0.75; margin-bottom: 20px; }
        .breadcrumb a { color: white; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .detail-hero h1 { font-family: 'Sora', sans-serif; font-size: 34px; font-weight: 800; margin-bottom: 20px; max-width: 800px; line-height: 1.25; letter-spacing: -0.5px; }
        .hero-meta { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .meta-item { font-size: 13px; opacity: 0.8; }
        .bookmark-btn { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.3); color: white; padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .bookmark-btn:hover { background: rgba(255,255,255,0.25); }
        .bookmark-btn.bookmarked { background: rgba(255,255,255,0.9); color: var(--primary); }
        .verdict-badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-weight: 700; font-size: 12px; font-family: 'Sora', sans-serif; }
        .verdict-TRUE { background: #d1fae5; color: #065f46; border: 1.5px solid #6ee7b7; }
        .verdict-FALSE { background: #fee2e2; color: #7f1d1d; border: 1.5px solid #fca5a5; }
        .verdict-PARTIAL { background: #fef3c7; color: #78350f; border: 1.5px solid #fcd34d; }
        .detail-content { padding: 40px 0 60px; }
        .detail-layout { display: grid; grid-template-columns: 1fr 300px; gap: 28px; align-items: start; }
        .section-block { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 26px; margin-bottom: 18px; animation: fadeInUp 0.4s ease both; }
        .section-block h2 { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .section-block p, .section-block li { color: #4a5568; line-height: 1.75; margin-bottom: 10px; font-size: 15px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        .verdict-section { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 18px; text-align: center; }
        .verdict-section h2 { font-family: 'Sora', sans-serif; font-size: 18px; margin-bottom: 14px; }
        .verdict-explanation { margin-top: 18px; color: #4a5568; font-size: 15px; line-height: 1.75; text-align: left; }
        .papers-section { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 26px; margin-bottom: 18px; }
        .papers-section h2 { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .papers-count { font-size: 12px; background: var(--purple-soft); color: var(--primary); padding: 3px 10px; border-radius: 20px; font-weight: 700; font-family: 'Sora', sans-serif; }
        .paper-card { border: 1.5px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 14px; transition: all 0.2s; position: relative; overflow: hidden; }
        .paper-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--primary); border-radius: 2px 0 0 2px; }
        .paper-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(108,99,255,0.1); transform: translateY(-2px); }
        .paper-card:last-child { margin-bottom: 0; }
        .paper-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 6px; }
        .paper-number { width: 24px; height: 24px; border-radius: 50%; background: var(--purple-soft); color: var(--primary); font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .paper-title { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); flex: 1; }
        .paper-year { font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--surface); padding: 3px 8px; border-radius: 6px; flex-shrink: 0; }
        .paper-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; margin-top: 4px; }
        .paper-authors { font-size: 12px; color: var(--text-muted); font-style: italic; }
        .paper-journal { font-size: 11px; background: #dbeafe; color: #1e40af; padding: 2px 8px; border-radius: 6px; font-weight: 600; }
        .paper-description { font-size: 13px; color: #4a5568; line-height: 1.6; margin-bottom: 12px; }
        .paper-link { display: inline-flex; align-items: center; gap: 6px; background: var(--purple-soft); color: var(--primary); padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 700; text-decoration: none; font-family: 'Sora', sans-serif; transition: all 0.2s; }
        .paper-link:hover { background: var(--primary); color: white; transform: translateY(-1px); }
        .videos-section { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 26px; margin-bottom: 18px; }
        .videos-section h2 { font-family: 'Sora', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
        .videos-count { font-size: 12px; background: #fee2e2; color: #991b1b; padding: 3px 10px; border-radius: 20px; font-weight: 700; font-family: 'Sora', sans-serif; }
        .video-cards-grid { display: grid; gap: 16px; }
        .video-card { border: 1.5px solid var(--border); border-radius: 12px; overflow: hidden; transition: all 0.25s; }
        .video-card:hover { border-color: #f56565; box-shadow: 0 4px 20px rgba(239,68,68,0.12); transform: translateY(-2px); }
        .video-thumb-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #1a1a2e; cursor: pointer; }
        .video-thumb-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .video-play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4); cursor: pointer; transition: background 0.2s; }
        .video-play-overlay:hover { background: rgba(0,0,0,0.2); }
        .play-circle { width: 56px; height: 56px; background: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); padding-left: 4px; transition: transform 0.2s; }
        .video-play-overlay:hover .play-circle { transform: scale(1.1); }
        .video-info { padding: 16px; }
        .video-title { font-family: 'Sora', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 6px; line-height: 1.35; }
        .video-channel { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: #991b1b; background: #fee2e2; padding: 2px 8px; border-radius: 6px; margin-bottom: 8px; }
        .video-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
        .video-watch-btn { display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; background: #fee2e2; color: #991b1b; padding: 6px 12px; border-radius: 7px; font-size: 12px; font-weight: 700; text-decoration: none; font-family: 'Sora', sans-serif; transition: all 0.2s; }
        .video-watch-btn:hover { background: #ef4444; color: white; }
        .vote-section { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 18px; text-align: center; }
        .vote-section h3 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
        .vote-buttons { display: flex; gap: 12px; justify-content: center; margin-bottom: 14px; }
        .vote-btn { display: flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 10px; border: 1.5px solid var(--border); background: var(--card); font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .vote-btn:hover { border-color: var(--primary); color: var(--primary); }
        .vote-btn.voted-up { background: #d1fae5; border-color: #6ee7b7; color: #065f46; }
        .vote-btn.voted-down { background: #fee2e2; border-color: #fca5a5; color: #7f1d1d; }
        .vote-bar { background: var(--surface); border-radius: 20px; height: 8px; overflow: hidden; margin-bottom: 8px; }
        .vote-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #9b59b6); border-radius: 20px; transition: width 0.6s ease; }
        .vote-counts { font-size: 12px; color: var(--text-muted); }
        .ai-expand-btn { display: flex; align-items: center; gap: 8px; padding: 11px 20px; background: var(--purple-soft); color: var(--primary); border: 1.5px solid var(--primary); border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; margin-top: 14px; width: 100%; justify-content: center; }
        .ai-expand-btn:hover { background: var(--primary); color: white; }
        .ai-expand-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .ai-expanded { margin-top: 14px; padding: 18px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; animation: fadeInUp 0.4s ease both; }
        .ai-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--purple-soft); color: var(--primary); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; font-family: 'Sora', sans-serif; margin-bottom: 10px; }
        .ai-expanded p { font-size: 13px; color: #374151; line-height: 1.7; margin-bottom: 8px; }
        .ai-expanded ul { padding-left: 18px; }
        .ai-expanded li { font-size: 13px; color: #374151; line-height: 1.7; margin-bottom: 4px; }
        .ai-disclaimer-sm { font-size: 11px; color: var(--text-muted); margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
        .thinking-inline { display: flex; align-items: center; gap: 10px; padding: 12px; color: var(--text-muted); font-size: 13px; }
        .thinking-dots-sm { display: inline-flex; gap: 4px; }
        .thinking-dots-sm span { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); animation: bounce 1.2s infinite ease-in-out; }
        .thinking-dots-sm span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots-sm span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        .sidebar-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .sidebar-card h3 { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 14px; }
        .quick-fact { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
        .quick-fact .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .quick-fact .value { font-weight: 600; color: var(--text); font-size: 13px; }
        .share-btn { display: block; width: 100%; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-size: 13px; font-weight: 500; margin-bottom: 8px; transition: all 0.2s; text-align: center; font-family: 'DM Sans', sans-serif; }
        .share-btn:hover { border-color: var(--primary); color: var(--primary); }
        .related-myth { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.2s; }
        .related-myth:last-child { border-bottom: none; }
        .related-myth:hover { opacity: 0.7; }
        .related-myth h4 { font-size: 12px; line-height: 1.4; }
        .no-data { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 14px; border: 1.5px dashed var(--border); border-radius: 10px; }
        .skeleton { background: linear-gradient(90deg, #f0eeff 25%, #e8e4ff 50%, #f0eeff 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .error-state { text-align: center; padding: 100px 20px; }
        .error-state h2 { font-family: 'Sora', sans-serif; font-size: 28px; margin-bottom: 12px; }
        footer { background: #1a1a2e; color: rgba(255,255,255,0.6); padding: 32px 0; text-align: center; font-size: 14px; }
        footer p { margin: 4px 0; }
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 500; }
        .auth-overlay.open { display: flex; }
        .auth-overlay-inner { position: relative; width: 100%; max-width: 480px; max-height: 90vh; border-radius: 24px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.35); background: transparent; }
        .auth-overlay-frame { width: 100%; height: 600px; border: none; display: block; }
        .auth-overlay-close { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 16px; border: none; background: rgba(0,0,0,0.6); color: white; cursor: pointer; font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; }
        @media (max-width: 900px) { .detail-layout { grid-template-columns: 1fr; } .detail-hero h1 { font-size: 24px; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🍎 Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <a href="contact-and-info.html">Contact & Info</a>
                <button id="adminBtn" class="btn-login" style="display:none;">Admin</button>
                <button id="loginBtn" class="btn-login">Login</button>
                <button id="themeToggle" class="btn-secondary" title="Toggle theme">🌗</button>
            </nav>
        </div>
    </header>

    <div id="heroSection">
        <div style="background:linear-gradient(135deg,#6c63ff,#764ba2);padding:60px 24px;">
            <div class="container">
                <div class="skeleton" style="height:14px;width:200px;opacity:0.4;margin-bottom:20px;"></div>
                <div class="skeleton" style="height:40px;width:80%;opacity:0.4;margin-bottom:12px;"></div>
                <div class="skeleton" style="height:40px;width:55%;opacity:0.4;margin-bottom:24px;"></div>
                <div class="skeleton" style="height:28px;width:100px;border-radius:20px;opacity:0.4;"></div>
            </div>
        </div>
    </div>

    <div id="mainContent">
        <div class="detail-content">
            <div class="container">
                <div class="detail-layout">
                    <div>
                        <div class="section-block"><div class="skeleton" style="height:16px;width:40%;margin-bottom:14px;"></div><div class="skeleton" style="height:13px;width:100%;margin-bottom:8px;"></div><div class="skeleton" style="height:13px;width:75%;"></div></div>
                    </div>
                    <div><div class="sidebar-card"><div class="skeleton" style="height:16px;width:60%;margin-bottom:14px;"></div><div class="skeleton" style="height:13px;width:100%;margin-bottom:8px;"></div></div></div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>🍎 Food Myth Buster &nbsp;•&nbsp; © 2026 Mapua Malayan Colleges Mindanao. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/theme.js"></script>
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var mythId = urlParams.get('id');
        var currentUser = null;
        var currentMyth = null;
        var isBookmarked = false;
        var userVote = null;

        async function init() {
            var session = await sb.auth.getSession();
            if (session.data.session) currentUser = session.data.session.user;
            await loadMythDetail();
        }

        async function loadMythDetail() {
            if (!mythId) { showError('No myth ID provided.'); return; }
            var res = await sb.from('myths').select('*, categories(name, slug, color, icon)').eq('id', mythId).single();
            if (res.error || !res.data) { showError('Myth not found.'); return; }
            currentMyth = res.data;
            document.title = currentMyth.title + ' - Food Myth Buster';
            document.querySelector('meta[name="description"]').setAttribute('content', currentMyth.summary || currentMyth.title);

            var sessionKey = 'fmb_view_' + mythId;
            var sessId = sessionStorage.getItem('fmb_session');
            if (!sessId) {
                sessId = 'sess_' + Math.random().toString(36).slice(2) + Date.now();
                sessionStorage.setItem('fmb_session', sessId);
            }
            if (!sessionStorage.getItem(sessionKey)) {
                await sb.rpc('increment_myth_view', {
                    p_myth_id: parseInt(mythId),
                    p_session_id: sessId,
                    p_user_id: currentUser ? currentUser.id : null
                });
                sessionStorage.setItem(sessionKey, '1');
            }

            var [papersRes, videosRes] = await Promise.all([
                sb.from('research_papers').select('*').eq('myth_id', mythId).order('id'),
                sb.from('myth_videos').select('*').eq('myth_id', mythId).order('id')
            ]);
            var papers = papersRes.data || [];
            var videos = videosRes.data || [];

            if (currentUser) {
                var bmRes = await sb.from('bookmarks').select('id').eq('user_id', currentUser.id).eq('myth_id', mythId).single();
                isBookmarked = !bmRes.error && !!bmRes.data;
                var voteRes = await sb.from('myth_votes').select('vote').eq('user_id', currentUser.id).eq('myth_id', mythId).single();
                if (!voteRes.error && voteRes.data) userVote = voteRes.data.vote;
            }

            var votesRes = await sb.from('myth_votes').select('vote').eq('myth_id', mythId);
            var votes = votesRes.data || [];
            var upVotes = votes.filter(function(v) { return v.vote === 'up'; }).length;
            var downVotes = votes.filter(function(v) { return v.vote === 'down'; }).length;

            renderHero(currentMyth);
            await renderContent(currentMyth, papers, videos, upVotes, downVotes);
        }

        function renderHero(myth) {
            var verdictLabel = myth.verdict === 'PARTIAL' ? 'Partial' : myth.verdict;
            document.getElementById('heroSection').innerHTML =
                '<section class="detail-hero">' +
                    '<div class="container"><div class="hero-inner">' +
                        '<div class="breadcrumb"><a href="../index.html">Home</a> → <a href="browse.html">Browse</a> → <a href="browse.html?category=' + (myth.categories ? myth.categories.slug : '') + '">' + (myth.categories ? myth.categories.name : 'General') + '</a></div>' +
                        '<div style="font-size:12px;opacity:0.7;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">' + (myth.categories ? (myth.categories.icon || '') : '') + ' ' + (myth.categories ? myth.categories.name : '') + '</div>' +
                        '<h1>' + myth.title + '</h1>' +
                        '<div class="hero-meta">' +
                            '<span class="verdict-badge verdict-' + myth.verdict + '">' + verdictLabel + '</span>' +
                            '<span class="meta-item">👁 ' + (myth.views || 0) + ' views</span>' +
                            (myth.updated_at ? '<span class="meta-item">Updated ' + new Date(myth.updated_at).toLocaleDateString() + '</span>' : '') +
                            '<button class="bookmark-btn' + (isBookmarked ? ' bookmarked' : '') + '" id="bookmarkBtn" onclick="toggleBookmark()">' +
                                (isBookmarked ? '🔖 Bookmarked' : '🔖 Bookmark') +
                            '</button>' +
                        '</div>' +
                    '</div></div>' +
                '</section>';
        }

        function buildPapersHTML(papers) {
            if (papers.length === 0) return '<div class="no-data"><p>No research papers linked yet for this myth.</p></div>';
            return papers.map(function(p, i) {
                return '<div class="paper-card">' +
                    '<div class="paper-header">' +
                        '<div class="paper-number">' + (i + 1) + '</div>' +
                        '<div class="paper-title">' + p.title + '</div>' +
                        (p.year ? '<div class="paper-year">' + p.year + '</div>' : '') +
                    '</div>' +
                    '<div class="paper-meta">' +
                        (p.authors ? '<span class="paper-authors">by ' + p.authors + '</span>' : '') +
                        (p.journal ? '<span class="paper-journal">' + p.journal + '</span>' : '') +
                    '</div>' +
                    (p.description ? '<p class="paper-description">' + p.description + '</p>' : '') +
                    (p.url ? '<a class="paper-link" href="' + p.url + '" target="_blank" rel="noopener">📄 Read Study →</a>' : '') +
                '</div>';
            }).join('');
        }

        function buildVideosHTML(videos) {
            if (videos.length === 0) return '<div class="no-data"><p>No videos linked yet for this myth.</p></div>';
            return '<div class="video-cards-grid">' +
                videos.map(function(v) {
                    var embedUrl = v.url;
                    if (embedUrl && embedUrl.includes('youtube.com/watch')) {
                        var vid = new URLSearchParams(embedUrl.split('?')[1]).get('v');
                        if (vid) embedUrl = 'https://www.youtube.com/embed/' + vid;
                    } else if (embedUrl && embedUrl.includes('youtu.be/')) {
                        var vid2 = embedUrl.split('youtu.be/')[1].split('?')[0];
                        embedUrl = 'https://www.youtube.com/embed/' + vid2;
                    }
                    return '<div class="video-card">' +
                        '<div class="video-thumb-wrapper" id="vthumb-' + v.id + '">' +
                            '<div class="video-play-overlay" onclick="loadVideo(' + v.id + ', \'' + embedUrl + '\')">' +
                                '<div class="play-circle">▶</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="video-info">' +
                            '<div class="video-title">' + v.title + '</div>' +
                            (v.channel ? '<div class="video-channel">📺 ' + v.channel + '</div>' : '') +
                            (v.description ? '<div class="video-desc">' + v.description + '</div>' : '') +
                            '<a class="video-watch-btn" href="' + v.url + '" target="_blank" rel="noopener">▶ Watch on YouTube</a>' +
                        '</div>' +
                    '</div>';
                }).join('') +
            '</div>';
        }

        function loadVideo(id, embedUrl) {
            var wrapper = document.getElementById('vthumb-' + id);
            if (!wrapper) return;
            // embedUrl comes from the database; ensure only trusted URLs are stored.
            wrapper.innerHTML = '<iframe src="' + embedUrl + '?autoplay=1" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen allow="autoplay"></iframe>';
        }

        async function renderContent(myth, papers, videos, upVotes, downVotes) {
            var relatedHTML = '';
            if (myth.category_id) {
                var relRes = await sb.from('myths').select('id, title, verdict').eq('category_id', myth.category_id).neq('id', myth.id).limit(3);
                if (relRes.data && relRes.data.length > 0) {
                    relatedHTML = relRes.data.map(function(r) {
                        var vl = r.verdict === 'PARTIAL' ? 'Partial' : r.verdict;
                        return '<div class="related-myth" onclick="window.location.href=\'detail.html?id=' + r.id + '\'">' +
                            '<span class="verdict-badge verdict-' + r.verdict + '" style="font-size:10px;padding:2px 8px;white-space:nowrap;">' + vl + '</span>' +
                            '<h4>' + r.title + '</h4></div>';
                    }).join('');
                }
            }

            var total = upVotes + downVotes;
            var upPct = total > 0 ? Math.round(upVotes / total * 100) : 50;
            var verdictLabel = myth.verdict === 'PARTIAL' ? 'Partial' : myth.verdict;

            var papersSection =
                '<div class="papers-section">' +
                    '<h2>📄 Research Papers <span class="papers-count">' + papers.length + ' stud' + (papers.length === 1 ? 'y' : 'ies') + '</span></h2>' +
                    buildPapersHTML(papers) +
                    (papers.length > 0 ?
                        '<button class="ai-expand-btn" id="aiExpandBtn" onclick="expandWithAI()">✨ Get AI Summary of All Evidence</button>' +
                        '<div id="aiExpandedContent"></div>'
                    : '') +
                '</div>';

            var videosSection =
                '<div class="videos-section">' +
                    '<h2>🎥 Supporting Videos <span class="videos-count">' + videos.length + ' video' + (videos.length === 1 ? '' : 's') + '</span></h2>' +
                    buildVideosHTML(videos) +
                '</div>';

            document.getElementById('mainContent').innerHTML =
                '<section class="detail-content">' +
                    '<div class="container"><div class="detail-layout">' +
                        '<div>' +
                            '<div class="verdict-section">' +
                                '<h2>The Verdict</h2>' +
                                '<span class="verdict-badge verdict-' + myth.verdict + '" style="font-size:16px;padding:10px 28px;">' + verdictLabel + '</span>' +
                                '<div class="verdict-explanation">' + (myth.verdict_explanation || myth.summary || 'No explanation provided yet.') + '</div>' +
                            '</div>' +
                            (myth.full_explanation ? '<div class="section-block"><h2>📖 Full Explanation</h2><p>' + myth.full_explanation + '</p></div>' : '') +
                            papersSection +
                            videosSection +
                            (myth.common_misconceptions ? '<div class="section-block"><h2>⚠️ Common Misconceptions</h2><p>' + myth.common_misconceptions + '</p></div>' : '') +
                            '<div class="vote-section">' +
                                '<h3>Was this helpful?</h3>' +
                                '<div class="vote-buttons">' +
                                    '<button class="vote-btn' + (userVote === 'up' ? ' voted-up' : '') + '" id="voteUpBtn" onclick="castVote(\'up\')">👍 Yes <span id="upCount">' + upVotes + '</span></button>' +
                                    '<button class="vote-btn' + (userVote === 'down' ? ' voted-down' : '') + '" id="voteDownBtn" onclick="castVote(\'down\')">👎 No <span id="downCount">' + downVotes + '</span></button>' +
                                '</div>' +
                                '<div class="vote-bar"><div class="vote-fill" id="voteFill" style="width:' + upPct + '%"></div></div>' +
                                '<div class="vote-counts" id="voteCounts">' + upVotes + ' helpful · ' + downVotes + ' not helpful</div>' +
                            '</div>' +
                        '</div>' +
                        '<div>' +
                            '<div class="sidebar-card">' +
                                '<h3>📌 Quick Facts</h3>' +
                                '<div class="quick-fact"><div><div class="label">Verdict</div><div class="value">' + verdictLabel + '</div></div></div>' +
                                '<div class="quick-fact"><div><div class="label">Category</div><div class="value">' + (myth.categories ? myth.categories.name : 'General') + '</div></div></div>' +
                                '<div class="quick-fact"><div><div class="label">Views</div><div class="value">' + (myth.views || 0) + '</div></div></div>' +
                                '<div class="quick-fact"><div><div class="label">Studies</div><div class="value">' + papers.length + ' research paper' + (papers.length !== 1 ? 's' : '') + '</div></div></div>' +
                                '<div class="quick-fact"><div><div class="label">Videos</div><div class="value">' + videos.length + ' video' + (videos.length !== 1 ? 's' : '') + '</div></div></div>' +
                            '</div>' +
                            '<div class="sidebar-card">' +
                                '<h3>🔗 Share</h3>' +
                                '<button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href);this.textContent=\'✅ Copied!\'">📋 Copy Link</button>' +
                                '<button class="share-btn" onclick="window.open(\'https://twitter.com/intent/tweet?text=' + encodeURIComponent(myth.title) + '&url=\'+encodeURIComponent(window.location.href))">🐦 Twitter</button>' +
                            '</div>' +
                            (relatedHTML ? '<div class="sidebar-card"><h3>🔁 Related Myths</h3>' + relatedHTML + '</div>' : '') +
                            '<a href="browse.html?category=' + (myth.categories ? myth.categories.slug : '') + '" style="display:block;text-align:center;text-decoration:none;padding:11px 20px;background:var(--primary);color:white;border-radius:10px;font-weight:600;font-family:\'Sora\',sans-serif;font-size:13px;transition:background 0.2s;" onmouseover="this.style.background=\'#5649e0\'" onmouseout="this.style.background=\'var(--primary)\'">More ' + (myth.categories ? myth.categories.name : '') + ' Myths →</a>' +
                        '</div>' +
                    '</div></div>' +
                '</section>';
        }

        async function toggleBookmark() {
            if (!currentUser) { openAuthOverlay(); return; }
            var btn = document.getElementById('bookmarkBtn');
            btn.disabled = true;
            if (isBookmarked) {
                await sb.from('bookmarks').delete().eq('user_id', currentUser.id).eq('myth_id', mythId);
                isBookmarked = false;
                btn.textContent = '🔖 Bookmark';
                btn.classList.remove('bookmarked');
            } else {
                await sb.from('bookmarks').insert({ user_id: currentUser.id, myth_id: parseInt(mythId) });
                isBookmarked = true;
                btn.textContent = '🔖 Bookmarked';
                btn.classList.add('bookmarked');
            }
            btn.disabled = false;
        }

        async function castVote(vote) {
            if (!currentUser) { openAuthOverlay(); return; }
            if (userVote === vote) {
                await sb.from('myth_votes').delete().eq('user_id', currentUser.id).eq('myth_id', mythId);
                userVote = null;
            } else {
                await sb.from('myth_votes').upsert({ user_id: currentUser.id, myth_id: parseInt(mythId), vote: vote }, { onConflict: 'myth_id,user_id' });
                userVote = vote;
            }
            var votesRes = await sb.from('myth_votes').select('vote').eq('myth_id', mythId);
            var votes = votesRes.data || [];
            var upVotes = votes.filter(function(v) { return v.vote === 'up'; }).length;
            var downVotes = votes.filter(function(v) { return v.vote === 'down'; }).length;
            var total = upVotes + downVotes;
            var upPct = total > 0 ? Math.round(upVotes / total * 100) : 50;
            document.getElementById('upCount').textContent = upVotes;
            document.getElementById('downCount').textContent = downVotes;
            document.getElementById('voteFill').style.width = upPct + '%';
            document.getElementById('voteCounts').textContent = upVotes + ' helpful · ' + downVotes + ' not helpful';
            document.getElementById('voteUpBtn').className = 'vote-btn' + (userVote === 'up' ? ' voted-up' : '');
            document.getElementById('voteDownBtn').className = 'vote-btn' + (userVote === 'down' ? ' voted-down' : '');
        }

        async function expandWithAI() {
            var myth = currentMyth;
            var btn = document.getElementById('aiExpandBtn');
            var container = document.getElementById('aiExpandedContent');
            btn.disabled = true;
            btn.textContent = 'Loading…';
            container.innerHTML = '<div class="thinking-inline"><div class="thinking-dots-sm"><span></span><span></span><span></span></div><span>Claude is analyzing all the evidence…</span></div>';

            try {
                var response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: 'You are a food science expert. Respond ONLY with valid JSON (no markdown, no backticks): {"deeper_context":"2-3 sentences","key_studies":["fact 1","fact 2","fact 3"],"practical_takeaway":"1-2 sentences","common_confusion":"1 sentence"}',
                        messages: [{ role: 'user', content: 'Food myth: "' + myth.title + '"\nVerdict: ' + myth.verdict + '\nSummary: ' + (myth.summary || '') }]
                    })
                });
                var data = await response.json();
                var text = data.content.map(function(i) { return i.text || ''; }).join('');
                var result = JSON.parse(text.replace(/```json|```/g, '').trim());
                container.innerHTML =
                    '<div class="ai-expanded">' +
                        '<span class="ai-badge">✨ AI Evidence Summary</span>' +
                        '<p><strong>Deeper Context:</strong> ' + result.deeper_context + '</p>' +
                        '<p><strong>Key Takeaways from the Studies:</strong></p>' +
                        '<ul>' + result.key_studies.map(function(s) { return '<li>' + s + '</li>'; }).join('') + '</ul>' +
                        '<p style="margin-top:10px;"><strong>Practical Takeaway:</strong> ' + result.practical_takeaway + '</p>' +
                        '<p><strong>Why People Get Confused:</strong> ' + result.common_confusion + '</p>' +
                        '<div class="ai-disclaimer-sm">⚠️ AI-generated summary. Always verify with the primary sources linked above.</div>' +
                    '</div>';
                btn.style.display = 'none';
            } catch(err) {
                container.innerHTML = '<p style="color:var(--text-muted);font-size:13px;padding:10px;">Could not load AI analysis. Try again.</p>';
                btn.disabled = false;
                btn.textContent = '✨ Get AI Summary of All Evidence';
            }
        }

        function showError(msg) {
            document.getElementById('heroSection').innerHTML = '';
            document.getElementById('mainContent').innerHTML =
                '<div class="error-state"><div style="font-size:64px;margin-bottom:16px;">😕</div><h2>Oops!</h2><p style="color:var(--text-muted);margin-bottom:24px;">' + msg + '</p><a href="browse.html" style="display:inline-block;padding:12px 24px;background:var(--primary);color:white;border-radius:10px;text-decoration:none;font-weight:600;">Browse All Myths</a></div>';
        }

        init();
    </script>
</body>
</html>
