<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Myths - Food Myth Buster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/theme.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #2d3748;
            --header-bg: #f7f8fc;
            --card-bg: #f7fafc;
            --border-color: #e2e8f0;
            --surface: #ffffff;
            --card: #f7fafc;
            --text: #2d3748;
            --border: #e2e8f0;
            --text-muted: #718096;
            --primary: #667eea;
            --primary-dark: #5568d3;
            --true: #10d988;
            --false: #ff5c6b;
            --partial: #ffb347;
        }

        body.dark {
            --bg-color: #0d0b1e;
            --text-color: #e8e6f0;
            --header-bg: rgba(13,11,30,0.97);
            --card-bg: #161330;
            --border-color: #2a2650;
            --surface: #0d0b1e;
            --card: #161330;
            --text: #e8e6f0;
            --border: #2a2650;
            --text-muted: #8886a8;
            --primary: #667eea;
            --primary-dark: #5568d3;
            --true: #10d988;
            --false: #ff5c6b;
            --partial: #ffb347;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg-color); color: var(--text-color); line-height: 1.6; transition: background 0.3s, color 0.3s; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: #3a3560; border-radius: 3px; }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 24px; }

        header {
            background: var(--header-bg);
            backdrop-filter: blur(16px);
            padding: 14px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        header .container { display: flex; justify-content: space-between; align-items: center; }

        .logo {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #7c6bff, #c77dff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        nav { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 7px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        nav a:hover { background: rgba(124,107,255,0.15); color: var(--text); }

        .btn-login {
            background: linear-gradient(135deg,#7c6bff,#9b6bff);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 9px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
        }

        .btn-login:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(124,107,255,0.4); }

        .btn-secondary {
            background: rgba(124,107,255,0.12);
            border: 1px solid rgba(124,107,255,0.3);
            color: #9b8fff;
            border-radius: 9px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 38px;
        }

        .btn-secondary:hover { background: rgba(124,107,255,0.2); border-color: rgba(124,107,255,0.6); transform: translateY(-1px); }
        .btn-secondary.active { background: rgba(124,107,255,0.25); border-color: rgba(124,107,255,0.8); }

        .browse-hero {
            background: linear-gradient(135deg, #6c63ff 0%, #9b59b6 60%, #764ba2 100%);
            padding: 56px 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .browse-hero h1 {
            font-family: 'Sora', sans-serif;
            font-size: 40px;
            font-weight: 800;
            color: white;
            margin-bottom: 8px;
            position: relative;
            letter-spacing: -1px;
        }

        .browse-hero p { font-size: 16px; color: rgba(255,255,255,0.8); position: relative; }

        .filters-bar {
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
            position: sticky;
            top: 65px;
            z-index: 100;
            transition: background 0.3s;
        }

        .filters-bar .container { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        .filter-btn {
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .filter-btn:hover, .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }

        .verdict-filter { margin-left: auto; }

        .verdict-filter select {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            background: var(--card);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            outline: none;
        }

        .browse-content { padding: 36px 0 60px; background: var(--bg-color); transition: background 0.3s; }

        .section-block { margin-bottom: 48px; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .section-title {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .results-count { color: var(--text-muted); font-size: 13px; }

        .myths-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            min-height: 160px;
        }

        .myth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 22px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
            position: relative;
            overflow: hidden;
        }

        .myth-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
        }

        .myth-card.v-TRUE::before { background: var(--true); }
        .myth-card.v-FALSE::before { background: var(--false); }
        .myth-card.v-PARTIAL::before { background: var(--partial); }

        .myth-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.15);
            border-color: var(--primary);
        }

        .myth-card .cat-tag {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .myth-card h3 {
            font-family: 'Sora', sans-serif;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
            color: var(--text);
        }

        .myth-card p { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; }

        .views-count { font-size: 11px; color: var(--text-muted); }

        .verdict-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 11px;
            font-family: 'Sora', sans-serif;
        }

        .verdict-TRUE { background: rgba(16,217,136,0.12); color: #10d988; border: 1px solid rgba(16,217,136,0.25); }
        .verdict-FALSE { background: rgba(255,92,107,0.12); color: #ff5c6b; border: 1px solid rgba(255,92,107,0.25); }
        .verdict-PARTIAL { background: rgba(255,179,71,0.12); color: #ffb347; border: 1px solid rgba(255,179,71,0.25); }

        .pagination {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .page-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--card);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        .page-btn.active { background: #7c6bff; border-color: #7c6bff; color: white; box-shadow: 0 4px 14px rgba(124,107,255,0.35); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .for-you-refresh { display: flex; align-items: center; gap: 8px; }

        .refresh-btn {
            background: rgba(124,107,255,0.12);
            border: 1px solid rgba(124,107,255,0.3);
            color: #9b8fff;
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .refresh-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
        .refresh-btn.spinning svg { animation: spin 0.6s linear; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .for-you-hint { font-size: 12px; color: var(--text-muted); font-style: italic; }

        .skeleton {
            background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .skeleton-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 22px;
        }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); grid-column: 1/-1; }
        .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-family: 'Sora', sans-serif; font-size: 18px; color: var(--text); margin-bottom: 6px; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-8px); } }
        .fade-out .myth-card { animation: fadeOutUp 0.16s ease both; }

        footer {
            background: var(--header-bg);
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            padding: 28px 0;
            text-align: center;
            font-size: 13px;
            transition: background 0.3s;
        }

        footer p { margin: 4px 0; color: var(--text-muted); }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">&#x1F34E; Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <a href="contact-and-info.html">Contact &amp; Info</a>
                <button id="adminBtn" class="btn-login" style="display:none;">Admin</button>
                <button id="loginBtn" class="btn-login" style="visibility:hidden;">Login</button>
                <button id="themeToggle" class="btn-secondary" title="Toggle theme">&#x2600;&#xFE0F;</button>
            </nav>
        </div>
    </header>

    <section class="browse-hero">
        <div class="container">
            <h1>Browse Food Myths</h1>
            <p>Explore myths by category and verdict &#x2014; all evidence-based</p>
        </div>
    </section>

    <div class="filters-bar">
        <div class="container">
            <button class="filter-btn active" data-category="all" onclick="setCategory('all',this)">All</button>
            <div id="categoryFilters" class="category-filter-container" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
            <div class="verdict-filter">
                <select id="verdictFilter" onchange="setVerdict(this.value)">
                    <option value="all">All Verdicts</option>
                    <option value="TRUE">True</option>
                    <option value="FALSE">False</option>
                    <option value="PARTIAL">Partial</option>
                </select>
            </div>
        </div>
    </div>

    <section class="browse-content">
        <div class="container">
            <div id="popularBlock" class="section-block">
                <div class="section-header">
                    <div class="section-title">&#x1F525; Most Popular Myths</div>
                    <span class="results-count" id="popularCount"></span>
                </div>
                <div id="popularGrid" class="myths-grid"></div>
                <div id="popularPagination" class="pagination"></div>
            </div>

            <div id="foryouBlock" class="section-block">
                <div class="section-header">
                    <div class="section-title">&#x2728; For You</div>
                    <div class="for-you-refresh">
                        <span class="for-you-hint" id="foryouHint">Based on what you browse</span>
                        <button class="refresh-btn" id="refreshBtn" onclick="refreshForYou()">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                            Refresh
                        </button>
                    </div>
                </div>
                <div id="foryouGrid" class="myths-grid"></div>
                <div id="foryouPagination" class="pagination"></div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&#x1F34E; Food Myth Buster &nbsp;&#x2022;&nbsp; &#xA9; 2026 Mapua Malayan Colleges Mindanao</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <!-- no need to load theme.js again, already in head -->
    <script>
        var PER_PAGE = 8;
        var allMyths = [];
        var popularFiltered = [];
        var foryouFiltered = [];
        var popularPage = 1;
        var foryouPage = 1;
        var activeCategory = 'all';
        var activeVerdict = 'all';

        var urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('category')) activeCategory = urlParams.get('category');

        function getPrefs() {
            try { return JSON.parse(localStorage.getItem('fmb_prefs') || '{}'); }
            catch(e) { return {}; }
        }

        function savePrefs(p) {
            try { localStorage.setItem('fmb_prefs', JSON.stringify(p)); } catch(e) {}
        }

        function trackClick(myth) {
            var p = getPrefs();
            if (!p.cats) p.cats = {};
            if (!p.verdicts) p.verdicts = {};
            var slug = myth.categories ? myth.categories.slug : 'general';
            p.cats[slug] = (p.cats[slug] || 0) + 1;
            p.verdicts[myth.verdict] = (p.verdicts[myth.verdict] || 0) + 1;
            p.lastVisited = (p.lastVisited || []);
            if (p.lastVisited.indexOf(myth.id) === -1) p.lastVisited.unshift(myth.id);
            if (p.lastVisited.length > 30) p.lastVisited = p.lastVisited.slice(0, 30);
            savePrefs(p);
        }

        function buildForYouPool(myths) {
            var p = getPrefs();
            var cats = p.cats || {};
            var verdicts = p.verdicts || {};
            var visited = p.lastVisited || [];
            var hasPref = Object.keys(cats).length > 0 || Object.keys(verdicts).length > 0;

            if (!hasPref) {
                document.getElementById('foryouHint').textContent = 'Browse myths to personalise this section';
                return myths.slice().sort(function() { return Math.random() - 0.5; });
            }

            document.getElementById('foryouHint').textContent = 'Based on what you browse';

            var totalC = Object.values(cats).reduce(function(a,b) { return a+b; }, 0) || 1;
            var totalV = Object.values(verdicts).reduce(function(a,b) { return a+b; }, 0) || 1;

            var scored = myths.map(function(myth) {
                var slug = myth.categories ? myth.categories.slug : 'general';
                var score = ((cats[slug] || 0) / totalC) * 60 + ((verdicts[myth.verdict] || 0) / totalV) * 30 + (visited.indexOf(myth.id) === -1 ? 10 : 0) + Math.random() * 20;
                return { myth: myth, score: score };
            });

            scored.sort(function(a, b) { return b.score - a.score; });
            return scored.map(function(s) { return s.myth; });
        }

        async function loadCategories() {
            var res = await sb.from('categories').select('*').order('name');
            if (!res.data) return;
            var container = document.getElementById('categoryFilters');
            res.data.forEach(function(cat) {
                var btn = document.createElement('button');
                btn.className = 'filter-btn' + (activeCategory === cat.slug ? ' active' : '');
                btn.textContent = (cat.icon || '') + ' ' + cat.name;
                btn.dataset.category = cat.slug;
                btn.onclick = function() { setCategory(cat.slug, btn); };
                container.appendChild(btn);
            });
        }

        async function loadMyths() {
            renderSkeletons('popularGrid', 8);
            renderSkeletons('foryouGrid', 8);
            var res = await sb.from('myths').select('*, categories(name, slug, color, icon)').order('views', { ascending: false });
            if (res.error) return;
            allMyths = res.data || [];
            applyFilters();
        }

        function setCategory(slug, btn) {
            activeCategory = slug;
            popularPage = 1;
            foryouPage = 1;
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            else {
                var ab = document.querySelector('[data-category="all"]');
                if (ab) ab.classList.add('active');
            }
            applyFilters();
        }

        function setVerdict(val) {
            activeVerdict = val;
            popularPage = 1;
            foryouPage = 1;
            applyFilters();
        }

        function applyFilters() {
            var base = allMyths;
            if (activeCategory !== 'all') base = base.filter(function(m) { return m.categories && m.categories.slug === activeCategory; });
            if (activeVerdict !== 'all') base = base.filter(function(m) { return m.verdict === activeVerdict; });

            popularFiltered = base.slice();
            foryouFiltered = buildForYouPool(base);

            document.getElementById('popularCount').textContent = popularFiltered.length + ' myths';
            renderSection('popular', popularPage, false);
            renderSection('foryou', foryouPage, false);
        }

        function refreshForYou() {
            var btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');
            foryouPage = 1;
            var base = allMyths;
            if (activeCategory !== 'all') base = base.filter(function(m) { return m.categories && m.categories.slug === activeCategory; });
            if (activeVerdict !== 'all') base = base.filter(function(m) { return m.verdict === activeVerdict; });
            foryouFiltered = buildForYouPool(base);
            renderSection('foryou', 1, true);
            setTimeout(function() { btn.classList.remove('spinning'); }, 600);
        }

        function renderSection(which, page, animate) {
            var filtered = which === 'popular' ? popularFiltered : foryouFiltered;
            var gridId = which + 'Grid';
            var paginationId = which + 'Pagination';
            var grid = document.getElementById(gridId);

            if (which === 'popular') popularPage = page;
            else foryouPage = page;

            var start = (page - 1) * PER_PAGE;
            var items = filtered.slice(start, start + PER_PAGE);

            function doRender() {
                grid.classList.remove('fade-out');
                if (items.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><div class="emoji">&#x1F50D;</div><h3>No myths found</h3><p>Try a different filter</p></div>';
                    document.getElementById(paginationId).innerHTML = '';
                    return;
                }
                grid.innerHTML = '';
                items.forEach(function(myth, i) {
                    var card = document.createElement('div');
                    card.className = 'myth-card v-' + myth.verdict;
                    card.style.animation = 'fadeInUp 0.35s ease ' + (i * 0.045) + 's both';
                    card.onclick = function() {
                        trackClick(myth);
                        window.location.href = 'detail.html?id=' + myth.id;
                    };
                    var vl = myth.verdict === 'PARTIAL' ? 'Partial' : myth.verdict;
                    card.innerHTML =
                        '<div class="cat-tag">' + (myth.categories ? myth.categories.icon || '' : '') + ' ' + (myth.categories ? myth.categories.name : 'General') + '</div>' +
                        '<h3>' + myth.title + '</h3>' +
                        '<p>' + (myth.summary || '') + '</p>' +
                        '<div class="card-footer">' +
                            '<span class="verdict-badge verdict-' + myth.verdict + '">' + vl + '</span>' +
                            '<span class="views-count">&#x1F441; ' + (myth.views || 0) + '</span>' +
                        '</div>';
                    grid.appendChild(card);
                });
                renderPagination(which, filtered.length, page);
                if (animate) window.scrollTo({ top: document.getElementById(which + 'Block').offsetTop - 100, behavior: 'smooth' });
            }

            if (animate) {
                grid.classList.add('fade-out');
                setTimeout(doRender, 160);
            } else {
                doRender();
            }
        }

        function renderPagination(which, total, cur) {
            var totalPages = Math.ceil(total / PER_PAGE);
            var bar = document.getElementById(which + 'Pagination');
            if (totalPages <= 1) { bar.innerHTML = ''; return; }

            bar.innerHTML = '';

            for (var p = 1; p <= totalPages; p++) {
                var btn = document.createElement('button');
                btn.className = 'page-btn' + (p === cur ? ' active' : '');
                btn.textContent = p;
                (function(pg) {
                    btn.onclick = function() { if (pg !== cur) renderSection(which, pg, true); };
                })(p);
                bar.appendChild(btn);
            }
        }

        function renderSkeletons(gridId, count) {
            var grid = document.getElementById(gridId);
            grid.innerHTML = '';
            for (var i = 0; i < count; i++) {
                var d = document.createElement('div');
                d.className = 'skeleton-card';
