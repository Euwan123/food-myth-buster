<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Food Myth Buster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #6c63ff; --primary-dark: #5649e0; --purple-soft: #f0eeff; --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7f0; --surface: #f8f7ff; --true: #10b981; --false: #ef4444; --partial: #f59e0b; }
        body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--surface); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        header { background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); padding: 16px 0; position: sticky; top: 0; z-index: 200; border-bottom: 1px solid var(--border); box-shadow: 0 1px 16px rgba(108,99,255,0.08); }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; color: var(--primary); }
        nav { display: flex; gap: 8px; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        nav a:hover { background: var(--purple-soft); color: var(--primary); }
        .btn-login { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .admin-hero { padding: 32px 24px 20px; }
        .admin-title { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
        .admin-sub { font-size: 14px; color: var(--text-muted); }

        .admin-layout { padding: 10px 0 40px; display: grid; grid-template-columns: minmax(0,2.2fr) minmax(0,1fr); gap: 24px; align-items: flex-start; }

        .card { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 20px 22px; box-shadow: 0 6px 20px rgba(15,23,42,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-title { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .pill { font-size: 11px; padding: 3px 9px; border-radius: 999px; background: var(--purple-soft); color: var(--primary); font-weight: 600; }

        .submissions-list { margin-top: 6px; }
        .submission-row { border-top: 1px solid var(--border); padding: 12px 0; display: grid; grid-template-columns: minmax(0,3fr) minmax(0,1.5fr) minmax(0,1fr); gap: 12px; align-items: center; font-size: 13px; }
        .submission-row:first-of-type { border-top: none; padding-top: 4px; }
        .submission-text { font-weight: 500; }
        .submission-meta { color: var(--text-muted); }
        .status-pill { font-size: 11px; padding: 3px 10px; border-radius: 999px; font-weight: 700; border: 1px solid transparent; display: inline-block; }
        .status-pending { background: #fef3c7; color: #92400e; border-color: #fcd34d; }
        .status-approved { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
        .status-rejected { background: #fee2e2; color: #7f1d1d; border-color: #fca5a5; }

        .actions { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-action { border-radius: 8px; border: 1px solid var(--border); padding: 6px 10px; font-size: 12px; cursor: pointer; background: white; font-family: 'DM Sans', sans-serif; font-weight: 600; }
        .btn-approve { border-color: #10b981; color: #047857; }
        .btn-reject { border-color: #ef4444; color: #b91c1c; }
        .btn-approve:hover { background: #ecfdf5; }
        .btn-reject:hover { background: #fef2f2; }

        .empty { text-align: center; padding: 40px 10px; color: var(--text-muted); font-size: 14px; }

        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-top: 6px; }
        .stat-card { padding: 12px 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); }
        .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 4px; }
        .stat-value { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 800; }

        .alert { margin-top: 10px; font-size: 13px; color: var(--text-muted); }

        @media (max-width: 920px) {
            .admin-layout { grid-template-columns: minmax(0,1fr); }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🍎 Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <a href="contact-and-info.html">Contact & Info</a>
                <button id="loginBtn" class="btn-login">Profile</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="admin-hero">
            <h1 class="admin-title">Admin Panel</h1>
            <p class="admin-sub">Review and moderate user myth submissions.</p>
        </section>

        <section class="admin-layout">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>Incoming Submissions</span>
                        <span class="pill" id="pendingCountPill">0 pending</span>
                    </div>
                </div>
                <div id="submissionsList" class="submissions-list"></div>
            </div>

            <aside class="card">
                <div class="card-header">
                    <div class="card-title">
                        <span>Overview</span>
                    </div>
                </div>
                <div class="stat-grid">
                    <div class="stat-card">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="statPending">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Approved</div>
                        <div class="stat-value" id="statApproved">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Rejected</div>
                        <div class="stat-value" id="statRejected">0</div>
                    </div>
                </div>
                <p class="alert" id="adminAlert"></p>
            </aside>
        </section>
    </main>

    <footer>
        <div class="container" style="padding:26px 0 32px;color:rgba(15,23,42,0.5);font-size:13px;text-align:center;">
            <p>Admin tools are for reviewing user myth submissions only.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        var adminUser = null;

        async function initAdmin() {
            var session = await sb.auth.getSession();
            if (!session.data.session || !session.data.session.user || !session.data.session.user.user_metadata || session.data.session.user.user_metadata.role !== 'admin') {
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:DM Sans,sans-serif;color:#4b5563;"><div style="max-width:320px;text-align:center;padding:24px;border-radius:16px;border:1px solid #e5e7eb;background:white;"><div style="font-size:40px;margin-bottom:8px;">🔒</div><div style="font-weight:700;margin-bottom:4px;">Admin only</div><div style="font-size:14px;margin-bottom:16px;">You need an admin account to view this page.</div><a href="../index.html" style="display:inline-block;padding:10px 18px;border-radius:10px;background:#6c63ff;color:white;text-decoration:none;font-size:14px;font-weight:600;">Back to home</a></div></div>';
                return;
            }
            adminUser = session.data.session.user;
            loadStats();
            loadSubmissions();
        }

        async function loadStats() {
            var res = await sb.from('myth_submissions').select('status');
            if (res.error || !res.data) return;
            var pending = 0;
            var approved = 0;
            var rejected = 0;
            res.data.forEach(function (s) {
                if (s.status === 'approved') approved += 1;
                else if (s.status === 'rejected') rejected += 1;
                else pending += 1;
            });
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statRejected').textContent = rejected;
        }

        async function loadSubmissions() {
            var list = document.getElementById('submissionsList');
            list.innerHTML = '<div class="empty">Loading submissions…</div>';
            var res = await sb.from('myth_submissions').select('id,myth_text,status,created_at,category_id,source_link').order('created_at', { ascending: false });
            if (res.error) {
                list.innerHTML = '<div class="empty">Could not load submissions.</div>';
                return;
            }
            var items = res.data || [];
            if (!items.length) {
                list.innerHTML = '<div class="empty">No submissions yet.</div>';
                document.getElementById('pendingCountPill').textContent = '0 pending';
                return;
            }
            var pendingCount = items.filter(function (s) { return !s.status || s.status === 'pending'; }).length;
            document.getElementById('pendingCountPill').textContent = pendingCount + ' pending';
            var html = '';
            items.forEach(function (s) {
                var status = s.status || 'pending';
                var statusClass = status === 'approved' ? 'status-approved' : status === 'rejected' ? 'status-rejected' : 'status-pending';
                var statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
                html +=
                    '<div class="submission-row">' +
                        '<div>' +
                            '<div class="submission-text">' + s.myth_text + '</div>' +
                            '<div class="submission-meta">Source: ' + (s.source_link || 'None given') + '</div>' +
                        '</div>' +
                        '<div>' +
                            '<span class="status-pill ' + statusClass + '">' + statusLabel + '</span>' +
                            '<div class="submission-meta">' + new Date(s.created_at).toLocaleDateString() + '</div>' +
                        '</div>' +
                        '<div class="actions">' +
                            '<button class="btn-action btn-approve" onclick="updateStatus(\'' + s.id + '\', \'approved\')">Approve</button>' +
                            '<button class="btn-action btn-reject" onclick="updateStatus(\'' + s.id + '\', \'rejected\')">Reject</button>' +
                        '</div>' +
                    '</div>';
            });
            list.innerHTML = html;
        }

        async function updateStatus(id, status) {
            var alertBox = document.getElementById('adminAlert');
            alertBox.textContent = '';
            var res = await sb.from('myth_submissions').update({ status: status }).eq('id', id);
            if (res.error) {
                alertBox.textContent = 'Error updating status.';
                return;
            }
            alertBox.textContent = 'Status updated.';
            loadStats();
            loadSubmissions();
        }

        initAdmin();
    </script>
</body>
</html>
