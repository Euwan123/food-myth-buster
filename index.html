<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myth Detail - Food Myth Buster</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #6c63ff; --primary-dark: #5649e0; --purple-soft: #f0eeff;
            --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7f0; --surface: #f8f7ff;
            --true: #10b981; --false: #ef4444; --partial: #f59e0b;
        }
        body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--surface); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        header { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 16px 0; position: sticky; top: 0; z-index: 200; border-bottom: 1px solid var(--border); box-shadow: 0 1px 20px rgba(108,99,255,0.08); }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; color: var(--primary); }
        nav { display: flex; gap: 8px; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        nav a:hover { background: var(--purple-soft); color: var(--primary); }
        .btn-login { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .detail-hero { background: linear-gradient(135deg, #6c63ff 0%, #9b59b6 60%, #764ba2 100%); padding: 60px 24px; color: white; position: relative; overflow: hidden; }
        .detail-hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Crect x='0' y='0' width='2' height='2'/%3E%3C/g%3E%3C/svg%3E"); }
        .hero-inner { position: relative; }
        .breadcrumb { font-size: 13px; opacity: 0.75; margin-bottom: 20px; }
        .breadcrumb a { color: white; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .detail-hero h1 { font-family: 'Sora', sans-serif; font-size: 36px; font-weight: 800; margin-bottom: 20px; max-width: 800px; line-height: 1.25; letter-spacing: -0.5px; }
        .hero-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .meta-item { font-size: 13px; opacity: 0.8; }

        .verdict-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 12px; font-family: 'Sora', sans-serif; letter-spacing: 0.3px; }
        .verdict-TRUE { background: #d1fae5; color: #065f46; border: 1.5px solid #6ee7b7; }
        .verdict-FALSE { background: #fee2e2; color: #7f1d1d; border: 1.5px solid #fca5a5; }
        .verdict-PARTIALLY_TRUE { background: #fef3c7; color: #78350f; border: 1.5px solid #fcd34d; }

        .detail-content { padding: 48px 0 60px; }
        .detail-layout { display: grid; grid-template-columns: 1fr 320px; gap: 32px; align-items: start; }

        .section-block { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; animation: fadeInUp 0.4s ease both; }
        .section-block h2 { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .section-block p, .section-block li { color: #4a5568; line-height: 1.75; margin-bottom: 12px; font-size: 15px; }
        .section-block ul { padding-left: 20px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .verdict-section { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 28px; margin-bottom: 20px; text-align: center; }
        .verdict-section h2 { font-family: 'Sora', sans-serif; font-size: 20px; margin-bottom: 16px; }
        .verdict-section .verdict-badge { font-size: 16px; padding: 10px 30px; }
        .verdict-explanation { margin-top: 20px; color: #4a5568; font-size: 15px; line-height: 1.75; text-align: left; }

        .evidence-item { border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 14px; transition: border-color 0.2s; }
        .evidence-item:hover { border-color: var(--primary); }
        .evidence-item h4 { font-family: 'Sora', sans-serif; font-size: 15px; margin-bottom: 8px; color: var(--text); }
        .evidence-item p { font-size: 13px; color: var(--text-muted); margin: 0; }
        .evidence-source { display: inline-block; margin-top: 10px; font-size: 12px; background: #ebf4ff; color: #3182ce; padding: 4px 12px; border-radius: 12px; }

        .ai-expand-btn { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--purple-soft); color: var(--primary); border: 1.5px solid var(--primary); border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; margin-top: 16px; width: 100%; justify-content: center; }
        .ai-expand-btn:hover { background: var(--primary); color: white; }
        .ai-expand-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .ai-expanded { margin-top: 16px; padding: 20px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; animation: fadeInUp 0.4s ease both; }
        .ai-expanded-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--purple-soft); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; font-family: 'Sora', sans-serif; margin-bottom: 12px; }
        .ai-expanded p { font-size: 14px; color: #374151; line-height: 1.75; margin-bottom: 10px; }
        .ai-expanded ul { padding-left: 20px; }
        .ai-expanded li { font-size: 14px; color: #374151; line-height: 1.75; margin-bottom: 6px; }
        .ai-disclaimer-sm { font-size: 12px; color: var(--text-muted); margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }

        .thinking-inline { display: flex; align-items: center; gap: 10px; padding: 14px; color: var(--text-muted); font-size: 14px; }
        .thinking-dots-sm { display: inline-flex; gap: 4px; }
        .thinking-dots-sm span { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); animation: bounce 1.2s infinite ease-in-out; }
        .thinking-dots-sm span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots-sm span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        .sidebar-card { background: white; border: 1.5px solid var(--border); border-radius: 16px; padding: 22px; margin-bottom: 20px; }
        .sidebar-card h3 { font-family: 'Sora', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 16px; }
        .quick-fact { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
        .quick-fact .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .quick-fact .value { font-weight: 600; color: var(--text); font-size: 14px; }
        .share-btn { display: block; width: 100%; padding: 11px; border-radius: 8px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 13px; font-weight: 500; margin-bottom: 8px; transition: all 0.2s; text-align: center; font-family: 'DM Sans', sans-serif; }
        .share-btn:hover { border-color: var(--primary); color: var(--primary); }
        .related-myth { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: opacity 0.2s; }
        .related-myth:last-child { border-bottom: none; }
        .related-myth:hover { opacity: 0.7; }
        .related-myth h4 { font-size: 13px; line-height: 1.4; }

        .skeleton { background: linear-gradient(90deg, #f0eeff 25%, #e8e4ff 50%, #f0eeff 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .hero-skeleton { padding: 60px 24px; background: linear-gradient(135deg, #6c63ff 0%, #764ba2 100%); }
        .sk-hero-tag { height: 14px; width: 100px; margin-bottom: 20px; opacity: 0.4; }
        .sk-hero-h1 { height: 42px; width: 80%; margin-bottom: 12px; opacity: 0.4; }
        .sk-hero-h1b { height: 42px; width: 55%; margin-bottom: 24px; opacity: 0.4; }
        .sk-badge { height: 30px; width: 100px; border-radius: 20px; opacity: 0.4; display: inline-block; }

        .loading-detail { text-align: center; padding: 100px 20px; color: var(--text-muted); font-size: 18px; }
        .error-state { text-align: center; padding: 100px 20px; }
        .error-state h2 { font-family: 'Sora', sans-serif; font-size: 28px; margin-bottom: 12px; }

        footer { background: #1a1a2e; color: rgba(255,255,255,0.6); padding: 32px 0; text-align: center; font-size: 14px; }
        footer p { margin: 4px 0; }

        @media (max-width: 900px) { .detail-layout { grid-template-columns: 1fr; } .detail-hero h1 { font-size: 26px; } }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🍎 Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <button id="loginBtn" class="btn-login">Login</button>
            </nav>
        </div>
    </header>

    <div id="heroSection">
        <div class="hero-skeleton">
            <div class="container">
                <div class="skeleton sk-hero-tag"></div>
                <div class="skeleton sk-hero-h1"></div>
                <div class="skeleton sk-hero-h1b"></div>
                <div class="skeleton sk-badge"></div>
            </div>
        </div>
    </div>
    <div id="mainContent">
        <div class="detail-content">
            <div class="container">
                <div class="detail-layout">
                    <div>
                        <div class="section-block"><div class="skeleton" style="height:18px;width:40%;margin-bottom:16px;"></div><div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:80%;"></div></div>
                        <div class="section-block"><div class="skeleton" style="height:18px;width:40%;margin-bottom:16px;"></div><div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:90%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:70%;"></div></div>
                    </div>
                    <div>
                        <div class="sidebar-card"><div class="skeleton" style="height:18px;width:60%;margin-bottom:16px;"></div><div class="skeleton" style="height:14px;width:100%;margin-bottom:8px;"></div><div class="skeleton" style="height:14px;width:80%;"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>🍎 Food Myth Buster &nbsp;•&nbsp; Evidence-based food science</p>
            <p>© 2025 Food Myth Buster. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var mythId = urlParams.get('id');

        async function loadMythDetail() {
            if (!mythId) { showError('No myth ID provided.'); return; }

            var res = await sb.from('myths').select('*, categories(name, slug, color, icon)').eq('id', mythId).single();
            if (res.error || !res.data) { showError('Myth not found.'); return; }

            var myth = res.data;
            document.title = myth.title + ' - Food Myth Buster';
            await sb.from('myths').update({ views: (myth.views || 0) + 1 }).eq('id', mythId);

            renderHero(myth);
            await renderContent(myth);
        }

        function renderHero(myth) {
            document.getElementById('heroSection').innerHTML =
                '<section class="detail-hero">' +
                    '<div class="container"><div class="hero-inner">' +
                        '<div class="breadcrumb">' +
                            '<a href="../index.html">Home</a> → <a href="browse.html">Browse</a> → ' +
                            '<a href="browse.html?category=' + (myth.categories?.slug || '') + '">' + (myth.categories?.name || 'General') + '</a>' +
                        '</div>' +
                        '<div style="font-size:12px;opacity:0.7;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">' + (myth.categories?.icon || '') + ' ' + (myth.categories?.name || '') + '</div>' +
                        '<h1>' + myth.title + '</h1>' +
                        '<div class="hero-meta">' +
                            '<span class="verdict-badge verdict-' + myth.verdict + '">' + myth.verdict.replace('_', ' ') + '</span>' +
                            '<span class="meta-item">👁 ' + (myth.views || 0) + ' views</span>' +
                            (myth.updated_at ? '<span class="meta-item">Updated ' + new Date(myth.updated_at).toLocaleDateString() + '</span>' : '') +
                        '</div>' +
                    '</div></div>' +
                '</section>';
        }

        async function renderContent(myth) {
            var relatedHTML = '';
            if (myth.categories) {
                var relRes = await sb.from('myths').select('id, title, verdict').eq('category_id', myth.category_id).neq('id', myth.id).limit(3);
                if (relRes.data && relRes.data.length > 0) {
                    relatedHTML = relRes.data.map(function(r) {
                        return '<div class="related-myth" onclick="window.location.href=\'detail.html?id=' + r.id + '\'">' +
                            '<span class="verdict-badge verdict-' + r.verdict + '" style="font-size:10px;padding:3px 8px;white-space:nowrap;">' + r.verdict.replace('_', ' ') + '</span>' +
                            '<h4>' + r.title + '</h4></div>';
                    }).join('');
                }
            }

            var evidenceHTML = '';
            if (myth.evidence) {
                try {
                    var evidenceArr = typeof myth.evidence === 'string' ? JSON.parse(myth.evidence) : myth.evidence;
                    if (Array.isArray(evidenceArr)) {
                        evidenceHTML = evidenceArr.map(function(e) {
                            return '<div class="evidence-item"><h4>' + (e.title || 'Study') + '</h4><p>' + (e.description || e.summary || '') + '</p>' + (e.source ? '<span class="evidence-source">' + e.source + '</span>' : '') + '</div>';
                        }).join('');
                    } else { evidenceHTML = '<p>' + myth.evidence + '</p>'; }
                } catch(e) { evidenceHTML = '<p>' + myth.evidence + '</p>'; }
            } else {
                evidenceHTML = '<p style="color:var(--text-muted)">No specific evidence linked yet.</p>';
            }

            document.getElementById('mainContent').innerHTML =
                '<section class="detail-content">' +
                    '<div class="container">' +
                        '<div class="detail-layout">' +
                            '<div>' +
                                '<div class="verdict-section">' +
                                    '<h2>The Verdict</h2>' +
                                    '<span class="verdict-badge verdict-' + myth.verdict + '" style="font-size:16px;padding:10px 30px;">' + myth.verdict.replace('_', ' ') + '</span>' +
                                    '<div class="verdict-explanation">' + (myth.verdict_explanation || myth.summary || 'No explanation provided yet.') + '</div>' +
                                '</div>' +
                                (myth.full_explanation ?
                                    '<div class="section-block"><h2>📖 Full Explanation</h2><p>' + myth.full_explanation + '</p></div>' : '') +
                                '<div class="section-block" id="evidenceBlock">' +
                                    '<h2>🔬 Scientific Evidence</h2>' +
                                    evidenceHTML +
                                    '<button class="ai-expand-btn" id="aiExpandBtn" onclick="expandWithAI()">✨ Expand with AI Analysis</button>' +
                                    '<div id="aiExpandedContent"></div>' +
                                '</div>' +
                                (myth.common_misconceptions ?
                                    '<div class="section-block"><h2>⚠️ Common Misconceptions</h2><p>' + myth.common_misconceptions + '</p></div>' : '') +
                            '</div>' +
                            '<div class="sidebar">' +
                                '<div class="sidebar-card">' +
                                    '<h3>📌 Quick Facts</h3>' +
                                    '<div class="quick-fact"><div><div class="label">Verdict</div><div class="value">' + myth.verdict.replace('_', ' ') + '</div></div></div>' +
                                    '<div class="quick-fact"><div><div class="label">Category</div><div class="value">' + (myth.categories?.name || 'General') + '</div></div></div>' +
                                    '<div class="quick-fact"><div><div class="label">Views</div><div class="value">' + (myth.views || 0) + '</div></div></div>' +
                                '</div>' +
                                '<div class="sidebar-card">' +
                                    '<h3>🔗 Share This Myth</h3>' +
                                    '<button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href);this.textContent=\'✅ Copied!\'">📋 Copy Link</button>' +
                                    '<button class="share-btn" onclick="window.open(\'https://twitter.com/intent/tweet?text=' + encodeURIComponent(myth.title) + '&url=\'+encodeURIComponent(window.location.href))">🐦 Share on Twitter</button>' +
                                '</div>' +
                                (relatedHTML ? '<div class="sidebar-card"><h3>🔁 Related Myths</h3>' + relatedHTML + '</div>' : '') +
                                '<a href="browse.html?category=' + (myth.categories?.slug || '') + '" style="display:block;text-align:center;text-decoration:none;padding:12px 20px;background:var(--primary);color:white;border-radius:10px;font-weight:600;font-family:\'Sora\',sans-serif;font-size:14px;margin-top:4px;transition:background 0.2s;" onmouseover="this.style.background=\'#5649e0\'" onmouseout="this.style.background=\'var(--primary)\'">View More ' + (myth.categories?.name || '') + ' Myths →</a>' +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                '</section>';

            window._currentMyth = myth;
        }

        async function expandWithAI() {
            var myth = window._currentMyth;
            if (!myth) return;

            var btn = document.getElementById('aiExpandBtn');
            var container = document.getElementById('aiExpandedContent');
            btn.disabled = true;
            btn.textContent = 'Loading…';
            container.innerHTML =
                '<div class="thinking-inline">' +
                    '<div class="thinking-dots-sm"><span></span><span></span><span></span></div>' +
                    '<span>Claude is analyzing the evidence…</span>' +
                '</div>';

            try {
                var response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        system: 'You are a food science expert. Given a food myth and its verdict, provide a deeper scientific analysis. Respond ONLY with a valid JSON object (no markdown, no backticks) with this format: {"deeper_context": "2-3 sentences of deeper scientific context", "key_studies": ["study or fact 1", "study or fact 2", "study or fact 3"], "practical_takeaway": "1-2 sentences of practical advice for the average person", "common_confusion": "1 sentence explaining why people commonly misunderstand this"}',
                        messages: [{ role: 'user', content: 'Food myth: "' + myth.title + '"\nVerdict: ' + myth.verdict + '\nSummary: ' + (myth.summary || '') + '\nProvide a deeper scientific analysis.' }]
                    })
                });

                var data = await response.json();
                var text = data.content.map(function(i) { return i.text || ''; }).join('');
                var clean = text.replace(/```json|```/g, '').trim();
                var result = JSON.parse(clean);

                var studiesHTML = result.key_studies.map(function(s) { return '<li>' + s + '</li>'; }).join('');

                container.innerHTML =
                    '<div class="ai-expanded">' +
                        '<span class="ai-expanded-badge">✨ AI Deep Dive</span>' +
                        '<p><strong>Deeper Context:</strong> ' + result.deeper_context + '</p>' +
                        '<p><strong>Key Studies & Facts:</strong></p>' +
                        '<ul>' + studiesHTML + '</ul>' +
                        '<p style="margin-top:12px;"><strong>Practical Takeaway:</strong> ' + result.practical_takeaway + '</p>' +
                        '<p><strong>Why People Get Confused:</strong> ' + result.common_confusion + '</p>' +
                        '<div class="ai-disclaimer-sm">⚠️ AI-generated analysis. Always verify with primary scientific sources.</div>' +
                    '</div>';

                btn.style.display = 'none';
            } catch(err) {
                container.innerHTML = '<p style="color:var(--text-muted);font-size:13px;padding:12px;">Could not load AI analysis. Please try again.</p>';
                btn.disabled = false;
                btn.textContent = '✨ Expand with AI Analysis';
            }
        }

        function showError(msg) {
            document.getElementById('heroSection').innerHTML = '';
            document.getElementById('mainContent').innerHTML =
                '<div class="error-state">' +
                    '<div style="font-size:64px;margin-bottom:16px;">😕</div>' +
                    '<h2>Oops!</h2>' +
                    '<p style="color:var(--text-muted);margin-bottom:24px;">' + msg + '</p>' +
                    '<a href="browse.html" style="display:inline-block;padding:12px 24px;background:var(--primary);color:white;border-radius:10px;text-decoration:none;font-weight:600;">Browse All Myths</a>' +
                '</div>';
        }

        loadMythDetail();
    </script>
</body>
</html>
