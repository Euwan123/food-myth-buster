<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Myth Buster</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo .logo { font-size: 28px; }
        .auth-logo p { color: #718096; margin-top: 6px; font-size: 15px; }

        .auth-tabs {
            display: flex;
            background: #f7fafc;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 32px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: #718096;
        }
        .auth-tab.active {
            background: white;
            color: #2d3748;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus { border-color: #667eea; }

        .auth-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .auth-submit:hover { opacity: 0.9; }
        .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        .divider {
            text-align: center;
            color: #a0aec0;
            font-size: 14px;
            margin: 24px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e2e8f0;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { text-decoration: underline; }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error { background: #fed7d7; color: #742a2a; border: 1px solid #f56565; }
        .alert-success { background: #c6f6d5; color: #22543d; border: 1px solid #48bb78; }
        .alert.show { display: block; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo">🍎 Food Myth Buster</div>
                <p>Join the community of myth busters</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" id="signupTab" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <div id="alertBox" class="alert"></div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Your password">
                </div>
                <button class="auth-submit" id="loginBtn" onclick="handleLogin()">Login</button>
                <div class="divider">or</div>
                <p style="text-align:center;font-size:14px;color:#718096;">
                    Don't have an account? <a href="#" onclick="switchTab('signup')" style="color:#667eea;">Sign up free</a>
                </p>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" style="display:none">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="At least 6 characters">
                </div>
                <button class="auth-submit" id="signupBtn" onclick="handleSignup()">Create Account</button>
                <div class="divider">or</div>
                <p style="text-align:center;font-size:14px;color:#718096;">
                    Already have an account? <a href="#" onclick="switchTab('login')" style="color:#667eea;">Login</a>
                </p>
            </div>

            <a href="../index.html" class="back-link">← Back to Food Myth Buster</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script>
        // Redirect if already logged in
        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '../index.html';
        });

        function switchTab(tab) {
            const isLogin = tab === 'login';
            document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
            document.getElementById('signupForm').style.display = isLogin ? 'none' : 'block';
            document.getElementById('loginTab').classList.toggle('active', isLogin);
            document.getElementById('signupTab').classList.toggle('active', !isLogin);
            hideAlert();
        }

        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alertBox');
            box.textContent = msg;
            box.className = `alert alert-${type} show`;
        }
        function hideAlert() {
            document.getElementById('alertBox').className = 'alert';
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) { showAlert('Please fill in all fields.'); return; }

            btn.disabled = true;
            btn.textContent = 'Logging in...';

            const { error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showAlert(error.message);
                btn.disabled = false;
                btn.textContent = 'Login';
            } else {
                showAlert('Welcome back! Redirecting...', 'success');
                setTimeout(() => window.location.href = '../index.html', 1200);
            }
        }

        async function handleSignup() {
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');

            if (!name || !email || !password) { showAlert('Please fill in all fields.'); return; }
            if (password.length < 6) { showAlert('Password must be at least 6 characters.'); return; }

            btn.disabled = true;
            btn.textContent = 'Creating account...';

            const { error } = await sb.auth.signUp({
                email,
                password,
                options: { data: { full_name: name } }
            });

            if (error) {
                showAlert(error.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            } else {
                showAlert('Account created! Check your email to confirm, then login.', 'success');
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const loginVisible = document.getElementById('loginForm').style.display !== 'none';
                loginVisible ? handleLogin() : handleSignup();
            }
        });
    </script>
</body>
</html>
