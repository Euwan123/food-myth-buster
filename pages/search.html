<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search - Food Myth Buster</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .search-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px 20px;
            text-align: center;
            color: white;
        }
        .search-hero h1 { font-size: 32px; margin-bottom: 24px; }
        .search-hero .search-bar { max-width: 700px; }

        .search-content { padding: 40px 20px; }

        .search-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .search-meta h2 { font-size: 20px; color: #2d3748; }
        .search-meta h2 span { color: #667eea; }
        .search-meta .count { color: #718096; font-size: 14px; }

        .filter-row {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .filter-chip {
            padding: 6px 16px;
            border-radius: 20px;
            border: 2px solid #e2e8f0;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .filter-chip:hover, .filter-chip.active {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .result-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-color: #667eea;
        }
        .result-card .category-tag {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #667eea;
            margin-bottom: 10px;
        }
        .result-card h3 { font-size: 17px; margin-bottom: 10px; line-height: 1.4; }
        .result-card p { font-size: 14px; color: #718096; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .result-footer { display: flex; justify-content: space-between; align-items: center; }
        .result-footer .views { font-size: 12px; color: #a0aec0; }

        /* Highlight matching text */
        mark { background: #fef3c7; color: #2d3748; padding: 0 2px; border-radius: 2px; }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            grid-column: 1/-1;
        }
        .empty-state .emoji { font-size: 64px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 22px; margin-bottom: 8px; }
        .empty-state p { color: #718096; margin-bottom: 24px; }

        .suggestions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .suggestion-chip {
            padding: 8px 18px;
            background: #ebf4ff;
            color: #3182ce;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .suggestion-chip:hover { background: #bee3f8; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🍎 Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <button id="loginBtn" class="btn-secondary">Login</button>
            </nav>
        </div>
    </header>

    <section class="search-hero">
        <div class="container">
            <h1>Search Food Myths</h1>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder='Search... (e.g., "Does coffee stunt growth?")'>
                <button id="searchBtn" class="btn-primary">🔍 Search</button>
            </div>
        </div>
    </section>

    <section class="search-content">
        <div class="container">
            <div class="search-meta">
                <h2 id="searchTitle">Results for <span id="queryDisplay"></span></h2>
                <span class="count" id="resultCount"></span>
            </div>

            <div class="filter-row">
                <button class="filter-chip active" data-verdict="all" onclick="filterResults('all', this)">All</button>
                <button class="filter-chip" data-verdict="TRUE" onclick="filterResults('TRUE', this)">✅ True</button>
                <button class="filter-chip" data-verdict="FALSE" onclick="filterResults('FALSE', this)">❌ False</button>
                <button class="filter-chip" data-verdict="PARTIALLY_TRUE" onclick="filterResults('PARTIALLY_TRUE', this)">⚠️ Partially True</button>
            </div>

            <div id="resultsGrid" class="results-grid">
                <div class="loading">Searching...</div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>🍎 Food Myth Buster</p>
            <p>© 2025 Food Myth Buster. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let currentQuery = urlParams.get('q') || '';
        let allResults = [];
        let activeVerdict = 'all';

        // Populate search input
        document.getElementById('searchInput').value = currentQuery;
        document.getElementById('queryDisplay').textContent = `"${currentQuery}"`;

        async function runSearch(query) {
            if (!query.trim()) {
                document.getElementById('searchTitle').innerHTML = 'All Myths';
                const { data } = await sb.from('myths').select('*, categories(name, slug, icon)').order('views', { ascending: false });
                allResults = data || [];
                renderResults();
                return;
            }

            document.getElementById('resultsGrid').innerHTML = '<div class="loading">Searching...</div>';

            const { data, error } = await sb
                .from('myths')
                .select('*, categories(name, slug, icon)')
                .or(`title.ilike.%${query}%,summary.ilike.%${query}%,verdict_explanation.ilike.%${query}%`)
                .order('views', { ascending: false });

            allResults = data || [];
            renderResults(query);
        }

        function renderResults(query = currentQuery) {
            let filtered = allResults;
            if (activeVerdict !== 'all') {
                filtered = filtered.filter(m => m.verdict === activeVerdict);
            }

            document.getElementById('resultCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''} found`;

            const grid = document.getElementById('resultsGrid');

            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">🔍</div>
                        <h3>No results found</h3>
                        <p>We couldn't find any myths matching "${query}"</p>
                        <a href="browse.html" class="btn-primary" style="text-decoration:none;display:inline-block;">Browse All Myths</a>
                        <div class="suggestions">
                            <span class="suggestion-chip" onclick="searchFor('MSG headaches')">MSG headaches</span>
                            <span class="suggestion-chip" onclick="searchFor('sugar hyperactivity')">Sugar hyperactivity</span>
                            <span class="suggestion-chip" onclick="searchFor('carrots eyesight')">Carrots eyesight</span>
                            <span class="suggestion-chip" onclick="searchFor('organic food')">Organic food</span>
                        </div>
                    </div>`;
                return;
            }

            grid.innerHTML = '';
            filtered.forEach(myth => {
                const card = document.createElement('div');
                card.className = 'result-card';
                card.onclick = () => window.location.href = `detail.html?id=${myth.id}`;

                // Highlight matching words
                const title = highlight(myth.title, query);
                const summary = highlight(myth.summary || '', query);

                card.innerHTML = `
                    <div class="category-tag">${myth.categories?.icon || ''} ${myth.categories?.name || 'General'}</div>
                    <h3>${title}</h3>
                    <p>${summary}</p>
                    <div class="result-footer">
                        <span class="verdict-badge verdict-${myth.verdict}">${myth.verdict.replace('_', ' ')}</span>
                        <span class="views">👁 ${myth.views || 0}</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function highlight(text, query) {
            if (!query) return text;
            const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
        }

        function filterResults(verdict, btn) {
            activeVerdict = verdict;
            document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderResults();
        }

        function searchFor(query) {
            document.getElementById('searchInput').value = query;
            currentQuery = query;
            document.getElementById('queryDisplay').textContent = `"${query}"`;
            window.history.pushState({}, '', `?q=${encodeURIComponent(query)}`);
            runSearch(query);
        }

        // Search button
        document.getElementById('searchBtn').addEventListener('click', () => {
            const q = document.getElementById('searchInput').value.trim();
            if (q) searchFor(q);
        });
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('searchBtn').click();
        });

        // Run initial search
        runSearch(currentQuery);
    </script>
</body>
</html>
