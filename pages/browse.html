<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Myths - Food Myth Buster</title>
    <meta name="description" content="Browse all food myths by category and verdict. Evidence-based answers to common food claims.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --primary: #6c63ff; --primary-dark: #5649e0; --purple-soft: #f0eeff; --text: #1a1a2e; --text-muted: #6b7280; --border: #e5e7f0; --surface: #f8f7ff; --true: #10b981; --false: #ef4444; --partial: #f59e0b; }
        body { font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--surface); line-height: 1.6; }
        .container { max-width: 1300px; margin: 0 auto; padding: 0 24px; }
        header { background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); padding: 16px 0; position: sticky; top: 0; z-index: 200; border-bottom: 1px solid var(--border); box-shadow: 0 1px 20px rgba(108,99,255,0.08); }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Sora', sans-serif; font-size: 22px; font-weight: 800; color: var(--primary); }
        nav { display: flex; gap: 8px; align-items: center; }
        nav a { color: var(--text-muted); text-decoration: none; padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
        nav a:hover { background: var(--purple-soft); color: var(--primary); }
        .btn-login { background: var(--primary); color: white; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
        .btn-login:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .browse-hero { background: linear-gradient(135deg, #6c63ff 0%, #9b59b6 60%, #764ba2 100%); padding: 60px 24px; text-align: center; position: relative; overflow: hidden; }
        .browse-hero::before { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Crect x='0' y='0' width='2' height='2'/%3E%3C/g%3E%3C/svg%3E"); }
        .browse-hero h1 { font-family: 'Sora', sans-serif; font-size: 42px; font-weight: 800; color: white; margin-bottom: 10px; letter-spacing: -1px; position: relative; }
        .browse-hero p { font-size: 17px; color: rgba(255,255,255,0.8); position: relative; }

        .filters-bar { background: white; border-bottom: 1px solid var(--border); padding: 16px 0; position: sticky; top: 65px; z-index: 100; }
        .filters-bar .container { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-btn { padding: 7px 18px; border-radius: 20px; border: 1.5px solid var(--border); background: white; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; font-family: 'DM Sans', sans-serif; color: var(--text-muted); }
        .filter-btn:hover, .filter-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
        .verdict-filter { margin-left: auto; }
        .verdict-filter select { padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 13px; cursor: pointer; background: white; font-family: 'DM Sans', sans-serif; outline: none; }
        .verdict-filter select:focus { border-color: var(--primary); }

        .browse-content { padding: 36px 0 60px; }
        .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .results-header h2 { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; }
        .results-count { color: var(--text-muted); font-size: 14px; }

        .myths-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }

        .myth-list-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 22px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden; animation: fadeInUp 0.4s ease both; }
        .myth-list-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--border); transition: background 0.2s; }
        .myth-list-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(108,99,255,0.12); border-color: var(--primary); }
        .myth-list-card:hover::before { background: var(--primary); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        .myth-list-card .category-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--primary); margin-bottom: 10px; }
        .myth-list-card h3 { font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 700; margin-bottom: 10px; line-height: 1.4; }
        .myth-list-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; }
        .views-count { font-size: 12px; color: var(--text-muted); }

        .verdict-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 11px; font-family: 'Sora', sans-serif; }
        .verdict-TRUE { background: #d1fae5; color: #065f46; border: 1.5px solid #6ee7b7; }
        .verdict-FALSE { background: #fee2e2; color: #7f1d1d; border: 1.5px solid #fca5a5; }
        .verdict-PARTIALLY_TRUE { background: #fef3c7; color: #78350f; border: 1.5px solid #fcd34d; }

        .skeleton { background: linear-gradient(90deg, #f0eeff 25%, #e8e4ff 50%, #f0eeff 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .skeleton-card { background: white; border: 1.5px solid var(--border); border-radius: 14px; padding: 22px; }
        .sk-line { height: 14px; margin-bottom: 10px; }

        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); grid-column: 1/-1; }
        .empty-state .emoji { font-size: 56px; margin-bottom: 16px; }
        .empty-state h3 { font-family: 'Sora', sans-serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }

        footer { background: #1a1a2e; color: rgba(255,255,255,0.6); padding: 32px 0; text-align: center; font-size: 14px; }
        footer p { margin: 4px 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">🍎 Food Myth Buster</div>
            <nav>
                <a href="../index.html">Home</a>
                <a href="browse.html">Browse Myths</a>
                <a href="community.html">Community</a>
                <a href="resources.html">Resources</a>
                <button id="loginBtn" class="btn-login">Login</button>
            </nav>
        </div>
    </header>

    <section class="browse-hero">
        <div class="container">
            <h1>Browse Food Myths</h1>
            <p>Explore myths by category and verdict — all backed by evidence</p>
        </div>
    </section>

    <div class="filters-bar">
        <div class="container">
            <button class="filter-btn active" data-category="all">All Categories</button>
            <div id="categoryFilters" style="display:contents"></div>
            <div class="verdict-filter">
                <select id="verdictFilter">
                    <option value="all">All Verdicts</option>
                    <option value="TRUE">✅ True</option>
                    <option value="FALSE">❌ False</option>
                    <option value="PARTIALLY_TRUE">⚠️ Partially True</option>
                </select>
            </div>
        </div>
    </div>

    <section class="browse-content">
        <div class="container">
            <div class="results-header">
                <h2 id="sectionTitle">All Myths</h2>
                <span class="results-count" id="resultsCount">Loading…</span>
            </div>
            <div id="mythsList" class="myths-list">
                <div class="skeleton-card"><div class="skeleton sk-line" style="width:40%"></div><div class="skeleton sk-line" style="width:100%"></div><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:30%;margin-top:8px"></div></div>
                <div class="skeleton-card"><div class="skeleton sk-line" style="width:40%"></div><div class="skeleton sk-line" style="width:100%"></div><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:30%;margin-top:8px"></div></div>
                <div class="skeleton-card"><div class="skeleton sk-line" style="width:40%"></div><div class="skeleton sk-line" style="width:100%"></div><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:30%;margin-top:8px"></div></div>
                <div class="skeleton-card"><div class="skeleton sk-line" style="width:40%"></div><div class="skeleton sk-line" style="width:100%"></div><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:30%;margin-top:8px"></div></div>
                <div class="skeleton-card"><div class="skeleton sk-line" style="width:40%"></div><div class="skeleton sk-line" style="width:100%"></div><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:30%;margin-top:8px"></div></div>
                <div class="skeleton-card"><div class="skeleton sk-line" style="width:40%"></div><div class="skeleton sk-line" style="width:100%"></div><div class="skeleton sk-line" style="width:70%"></div><div class="skeleton sk-line" style="width:30%;margin-top:8px"></div></div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>🍎 Food Myth Buster &nbsp;•&nbsp; Evidence-based food science</p>
            <p>© 2025 Food Myth Buster. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase-client.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        var allMyths = [];
        var activeCategory = 'all';
        var activeVerdict = 'all';
        var urlParams = new URLSearchParams(window.location.search);
        var urlCategory = urlParams.get('category');
        if (urlCategory) activeCategory = urlCategory;

        async function loadCategories() {
            var res = await sb.from('categories').select('*').order('name');
            if (!res.data) return;
            var container = document.getElementById('categoryFilters');
            res.data.forEach(function(cat) {
                var btn = document.createElement('button');
                btn.className = 'filter-btn' + (activeCategory === cat.slug ? ' active' : '');
                btn.textContent = (cat.icon || '') + ' ' + cat.name;
                btn.dataset.category = cat.slug;
                btn.onclick = function() { setCategory(cat.slug); };
                container.appendChild(btn);
            });
        }

        async function loadMyths() {
            var res = await sb.from('myths').select('*, categories(name, slug, color, icon)').order('views', { ascending: false });
            if (res.error) { document.getElementById('mythsList').innerHTML = '<p style="color:var(--text-muted);padding:20px;">Error loading myths.</p>'; return; }
            allMyths = res.data || [];
            renderMyths();
        }

        function setCategory(slug) {
            activeCategory = slug;
            document.querySelectorAll('.filter-btn').forEach(function(b) {
                b.classList.toggle('active', b.dataset.category === slug || (slug === 'all' && b.dataset.category === 'all'));
            });
            renderMyths();
        }

        document.getElementById('verdictFilter').addEventListener('change', function(e) { activeVerdict = e.target.value; renderMyths(); });
        document.querySelector('[data-category="all"]').addEventListener('click', function() { setCategory('all'); });

        function renderMyths() {
            var filtered = allMyths;
            if (activeCategory !== 'all') filtered = filtered.filter(function(m) { return m.categories?.slug === activeCategory; });
            if (activeVerdict !== 'all') filtered = filtered.filter(function(m) { return m.verdict === activeVerdict; });

            var container = document.getElementById('mythsList');
            document.getElementById('resultsCount').textContent = filtered.length + ' myth' + (filtered.length !== 1 ? 's' : '') + ' found';

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="emoji">🔍</div><h3>No myths found</h3><p>Try a different category or verdict filter</p></div>';
                return;
            }

            container.innerHTML = '';
            filtered.forEach(function(myth, i) {
                var card = document.createElement('div');
                card.className = 'myth-list-card';
                card.style.animationDelay = (i * 0.05) + 's';
                card.onclick = function() { window.location.href = 'detail.html?id=' + myth.id; };
                card.innerHTML =
                    '<div class="category-tag">' + (myth.categories?.icon || '') + ' ' + (myth.categories?.name || 'General') + '</div>' +
                    '<h3>' + myth.title + '</h3>' +
                    '<p>' + (myth.summary || '') + '</p>' +
                    '<div class="card-footer">' +
                        '<span class="verdict-badge verdict-' + myth.verdict + '">' + myth.verdict.replace('_', ' ') + '</span>' +
                        '<span class="views-count">👁 ' + (myth.views || 0) + '</span>' +
                    '</div>';
                container.appendChild(card);
            });
        }

        loadCategories();
        loadMyths();
    </script>
</body>
</html>
